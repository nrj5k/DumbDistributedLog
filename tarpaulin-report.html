<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

e(1000);\n\n    group.bench_function(\"push_1000\", |b| {\n        b.iter(|| {\n            let mut queue = SimpleQueue::\u003cf64\u003e::new();\n            let mut pushed = 0;\n            for i in 0..1000 {\n                if QueueTrait::publish(\u0026mut queue, i as f64).is_ok() {\n                    pushed += 1;\n                }\n            }\n            pushed\n        });\n    });\n\n    group.bench_function(\"push_pop_1000\", |b| {\n        b.iter(|| {\n            let mut queue = SimpleQueue::\u003cf64\u003e::new();\n            for i in 0..1000 {\n                let _ = QueueTrait::publish(\u0026mut queue, i as f64);\n            }\n            let mut sum = 0.0f64;\n            for _ in 0..1000 {\n                if let Some((_, val)) = QueueTrait::get_latest(\u0026queue) {\n                    sum += val;\n                }\n            }\n            sum\n        });\n    });\n\n    group.finish();\n}\n\n/// Benchmark: Lock-free Queue performance\nfn bench_lockfree_queue(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"lockfree_queue\");\n    group.sample_size(1000);\n\n    group.bench_function(\"push_1000\", |b| {\n        b.iter(|| {\n            let mut queue = LockFreeQueue::\u003cf64, 4096\u003e::new();\n            let mut pushed = 0;\n            for i in 0..1000 {\n                if QueueTrait::publish(\u0026mut queue, i as f64).is_ok() {\n                    pushed += 1;\n                }\n            }\n            pushed\n        });\n    });\n\n    group.bench_function(\"push_pop_1000\", |b| {\n        b.iter(|| {\n            let mut queue = LockFreeQueue::\u003cf64, 4096\u003e::new();\n            for i in 0..1000 {\n                let _ = QueueTrait::publish(\u0026mut queue, i as f64);\n            }\n            let mut sum = 0.0f64;\n            for _ in 0..1000 {\n                if let Some((_, val)) = QueueTrait::get_latest(\u0026queue) {\n                    sum += val;\n                }\n            }\n up.bench_function(\"spmc_single_push\", |b| {\n        b.iter(|| {\n            let mut queue = SPMCLockFreeQueue::\u003cf64, 4096\u003e::new();\n            let _ = queue.push(42.0);\n        });\n    });\n\n    group.bench_function(\"spmc_single_pop\", |b| {\n        b.iter(|| {\n            let queue = SPMCLockFreeQueue::\u003cf64, 4096\u003e::new();\n            let consumer = queue.consumer();\n            let _ = consumer.pop();\n        });\n    });\n    \n    group.bench_function(\"expression_eval\", |b| {\n        let vars: HashMap\u003cString, f64\u003e = vec![\n            (\"a\", 10.0),\n            (\"b\", 20.0),\n        ].into_iter().map(|(k, v)| (k.to_string(), v)).collect();\n        \n        b.iter(|| {\n            evaluate_expression(\"a + b * 2 - 5\", \u0026vars).unwrap()\n        });\n    });\n\n    group.finish();\n}\n\n/// Compare different queue implementations\nfn bench_queue_comparison(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"queue_comparison\");\n    group.sample_size(1000);\n    \n    const OPS: usize = 10_000;\n\n    group.bench_function(\"spmc_10k_ops\", |b| {\n        b.iter(|| {\n            let mut queue = SPMCLockFreeQueue::\u003cusize, 16384\u003e::new();\n            for i in 0..OPS {\n                let _ = queue.push(i);\n            }\n            let consumer = queue.consumer();\n            let mut sum = 0usize;\n            for _ in 0..OPS {\n                if let Some((_, v)) = consumer.pop() {\n                    sum += v;\n                }\n            }\n            sum\n        });\n    });\n\n    group.bench_function(\"simple_10k_ops\", |b| {\n        b.iter(|| {\n            let mut queue = SimpleQueue::\u003cusize\u003e::new();\n            for i in 0..OPS {\n                let _ = QueueTrait::publish(\u0026mut queue, i);\n            }\n            let mut sum = 0usize;\n            for _ in 0..OPS {\n                if let Some((_, v)) = QueueTrait::get_latest(\u0026queue) {\n l\n//!\n//! The node will:\n//! 1. Load configuration from the TOML file\n//! 2. Detect its node ID from NODE_ID environment variable\n//! 3. Collect local metrics based on [local] config\n//! 4. Publish values to other nodes via ZMQ\n//! 5. Compute global aggregations\n\nuse autoqueues::config::Config;\nuse autoqueues::node::AutoQueuesNode;\nuse std::path::PathBuf;\nuse structopt::StructOpt;\n\n/// Command line arguments\n#[derive(StructOpt, Debug)]\nstruct Args {\n    /// Path to config file\n    #[structopt(short, long, parse(from_os_str))]\n    config: Option\u003cPathBuf\u003e,\n}\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n    // Parse command line arguments\n    let args = Args::from_args();\n\n    // Determine config path\n    let config_path = args.config.unwrap_or_else(|| {\n        PathBuf::from(\"config-local.toml\")\n    });\n\n    println!(\"AutoQueues Node\");\n    println!(\"==============\");\n    println!(\"Config file: {:?}\", config_path);\n\n    // Load configuration\n    let config = Config::load(\u0026config_path)?;\n    println!(\"Configuration loaded successfully\");\n\n    // Detect node ID\n    let node_id = config.detect_node_id()?;\n    println!(\"Node ID: {}\", node_id);\n\n    // Get my node configuration\n    let my_node = config.my_node(node_id)?;\n    println!(\n        \"My address: {}:{} (pubsub: {})\",\n        my_node.host, my_node.communication_port, my_node.pubsub_port\n    );\n\n    // Show other nodes\n    let other_nodes = config.other_nodes(node_id);\n    println!(\"Other nodes: {}\", other_nodes.len());\n\n    // Show local metrics\n    println!(\"Local metrics:\");\n    for (name, source) in \u0026config.local {\n        println!(\"  {} = {}\", name, source);\n    }\n\n    // Show global aggregations\n    println!(\"Global aggregations:\");\n    for (name, config) in \u0026config.global {\n        let expr_str = config.expression.as_deref().unwrap_or(\"\");\n        println!(\n            \"  {}: {} {} (interval: {}ms) {}\",\n            name,\n            config.aggregation,\n            config.sources.join(\", \"),\n            config.interval_ms,\n            expr_str\n        );\n    }\n\n    // Create and run the node\n    let node = AutoQueuesNode::new(\u0026config).await?;\n    node.run(\u0026config).await?;\n\n    Ok(())\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","neeraj","syncthing","Darkforce","Sync","Git_repos","autoqueues","examples","persistence_demo.rs"],"content":"//! Persistence Demo\n//!\n//! Demonstrates the persistence functionality in AutoQueues.\n\nuse autoqueues::autoqueues::AutoQueues;\nuse autoqueues::config::Config;\nuse autoqueues::queue::persistence::PersistenceConfig;\nuse std::path::PathBuf;\nuse std::time::Duration;\nuse tokio::time::sleep;\n\n#[tokio::main]\nasync fn main() -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n    println!(\"Starting AutoQueues with persistence demo...\");\n    \n    // Create a config with persistence enabled\n    let config = Config::builder()\n        .capacity(1000)\n        .default_interval(100) // 100ms\n        .persistence(PersistenceConfig {\n            data_dir: PathBuf::from(\"demo_data\"),\n            max_file_size: 10 * 1024 * 1024, // 10MB\n            flush_interval_ms: 500,          // 500ms\n            include_timestamp: true,\n            compress_old: false,\n        })\n        .build();\n    \n    // Create AutoQueues instance\n    let autoqueues = AutoQueues::new(config);\n    \n    // Add a queue with persistence enabled\n    autoqueues\n        .add_queue_fn_with_persistence::\u003cf64, _\u003e(\"cpu_monitor\", || {\n            // Simulate CPU usage data\n            let cpu_usage = 20.0 + (rand::random::\u003cf64\u003e() * 60.0);\n            println!(\"Generated CPU usage: {:.2}%\", cpu_usage);\n            cpu_usage\n        }, autoqueues::queue::interval::IntervalConfig::default())?;\n    \n    // Add another queue with expression and persistence\n    autoqueues\n        .add_queue_expr_with_persistence(\n            \"cpu_alert\", \n            \"local.cpu_monitor\", \n            \"cpu_monitor\", \n            true, \n            Some(100)\n        )?;\n    \n    // Start the queues\n    autoqueues.start();\n    \n    println!(\"Queues started. Generating data for 5 seconds...\");\n    \n    // Let it run for a bit to generate some data\n    sleep(Duration::from_secs(5)).await;\n    \n    // Enable persistence for an existing queue\n    autoqueues.enable_persistence(\"cpu_alert\")?;\n    \n    println!(\"Enabled persistence for cpu_alert queue\");\n    \n    // Let it run a bit more\n    sleep(Duration::from_secs(2)).await;\n    \n    println!(\"Demo completed. Check the demo_data directory for log files.\");\n    \n    // Proper shutdown to flush all data\n    autoqueues.shutdown();\n    \n    println!(\"Press Ctrl+C to stop the demo.\");\n    \n    // Keep running\n    loop {\n        sleep(Duration::from_secs(1)).await;\n    }\n}","traces":[],"covered":0,"coverable":0},{"path":["/","home","neeraj","syncthing","Darkforce","Sync","Git_repos","autoqueues","src","autoqueues.rs"],"content":"//! AutoQueues Programmatic API\n//!\n//! Building on AutoQueues programmatically, adding queues and auto-population functions.\n//! Generic over type T for maximum flexibility.\n\nuse crate::config::Config;\nuse crate::constants;\nuse crate::network::pubsub::zmq::ZmqPubSubBroker;\nuse crate::queue::interval::IntervalConfig;\nuse crate::queue::registry::QueueRegistry;\nuse crate::queue::source::{AutoQueuesError, QueueSource};\nuse crate::traits::queue::QueueTrait;\nuse serde::{Serialize, de::DeserializeOwned};\nuse std::net::SocketAddr;\nuse std::sync::Arc;\n\n/// Main AutoQueues struct for programmatic mode.\npub struct AutoQueues {\n    registry: Arc\u003cQueueRegistry\u003e,\n    config: Config,\n    broker: Arc\u003cZmqPubSubBroker\u003e,\n}\n\nimpl AutoQueues {\n    /// Create a new AutoQueues instance with the given configuration\n    pub fn new(config: Config) -\u003e Self {\n        let registry = Arc::new(QueueRegistry::new(config.clone()));\n        let broker = Arc::new(ZmqPubSubBroker::new().expect(\"Failed to create ZMQ pubsub broker\"));\n\n        Self {\n            registry,\n            config,\n            broker,\n        }\n    }\n\n    /// Create a new AutoQueues instance with default configuration\n    pub fn default() -\u003e Self {\n        Self::new(Config::default())\n    }\n\n    /// Configure AutoQueues\n    pub fn configure() -\u003e Config {\n        Config::new()\n    }\n\n    /// Add a queue with a function source\n    pub fn add_queue_fn\u003cT, F\u003e(\u0026self, name: \u0026str, func: F) -\u003e Result\u003c\u0026Self, AutoQueuesError\u003e\n    where\n        T: Clone + Send + Sync + 'static,\n        F: QueueSource\u003cT\u003e + 'static,\n    {\n        self.registry.add_queue(name, func)?;\n        Ok(self)\n    }\n\n    /// Add a queue with a function source and interval configuration\n    pub fn add_queue_fn_with_interval\u003cT, F\u003e(\n        \u0026self,\n        name: \u0026str,\n        func: F,\n        interval: IntervalConfig,\n    ) -\u003e Result\u003c\u0026Self, AutoQueuesError\u003e\n    where\n        T: Clone + Send + Sync + 'static,\n        F: QueueSource\u003cT\u003e + 'static,\n    {\n        self.registry.add_queue_with_interval(name, func, interval)?;\n        Ok(self)\n    }\n\n    /// Add a queue with an expression source\n    pub fn add_queue_expr(\n        \u0026self,\n        name: \u0026str,\n        expression: \u0026str,\n        source_queue: \u0026str,\n        trigger_on_push: bool,\n        trigger_interval_ms: Option\u003cu64\u003e,\n    ) -\u003e Result\u003c\u0026Self, AutoQueuesError\u003e {\n        self.registry.add_expression_queue(\n            name,\n            expression,\n            source_queue,\n            trigger_on_push,\n            trigger_interval_ms,\n        )?;\n        Ok(self)\n    }\n\n    /// Add a distributed aggregation queue\n    pub fn add_distributed_queue(\n        \u0026self,\n        name: \u0026str,\n        operation: \u0026str,\n        source_queues: Vec\u003cString\u003e,\n    ) -\u003e Result\u003c\u0026Self, AutoQueuesError\u003e {\n        // Convert node configurations to SocketAddr\n        let nodes: Vec\u003cSocketAddr\u003e = self\n            .config\n            .nodes\n            .collect_nodes()\n            .iter()\n            .filter_map(|(_name, node_config)| {\n                format!(\"{}:{}\", node_config.host, node_config.communication_port)\n                    .parse()\n                    .ok()\n            })\n            .collect();\n\n        let source = crate::queue::source::DistributedAggregationSource::new(\n            name.to_string(),\n            operation.to_string(),\n            source_queues,\n            nodes,\n        );\n\n        // Distributed aggregations always evaluate to f64 values\n        self.registry.add_queue::\u003cf64\u003e(name, source)?;\n        Ok(self)\n    }\n\n    /// Start all queues\n    pub fn start(\u0026self) {\n        self.registry.start();\n    }\n\n    /// Start a specific queue\n    pub fn start_queue(\u0026self, name: \u0026str) {\n        // In a real implementation, this would start the specific queue\n        println!(\"Starting queue: {}\", name);\n    }\n\n    /// Pause a queue\n    pub fn pause(\u0026self, name: \u0026str) {\n        self.registry.pause(name);\n    }\n\n    /// Resume a queue\n    pub fn resume(\u0026self, name: \u0026str) {\n        self.registry.resume(name);\n    }\n\n    /// Remove a queue\n    pub fn remove(\u0026mut self, name: \u0026str) {\n        self.registry.remove(name);\n    }\n\n    /// Pop a value from a queue\n    pub fn pop\u003cT\u003e(\u0026self, name: \u0026str) -\u003e Result\u003cOption\u003cT\u003e, AutoQueuesError\u003e\n    where\n        T: Clone + Send + Sync + 'static,\n    {\n        let queue = self.registry.get_queue::\u003cT\u003e(name)?;\n        let guard = queue.try_read().map_err(|_| {\n            AutoQueuesError::QueueError(crate::queue::QueueError::Other(\n                \"Failed to acquire read lock\".to_string(),\n            ))\n        })?;\n        Ok(guard.get_latest().map(|(_, value)| value))\n    }\n\n    /// Try to pop a value from a queue (non-blocking)\n    pub fn try_pop\u003cT\u003e(\u0026self, name: \u0026str) -\u003e Result\u003cOption\u003cT\u003e, AutoQueuesError\u003e\n    where\n        T: Clone + Send + Sync + 'static,\n    {\n        let queue = self.registry.get_queue::\u003cT\u003e(name)?;\n        let guard = queue.try_read().map_err(|_| {\n            AutoQueuesError::QueueError(crate::queue::QueueError::Other(\n                \"Failed to acquire read lock\".to_string(),\n            ))\n        })?;\n        Ok(guard.get_latest().map(|(_, value)| value))\n    }\n\n    /// Subscribe to a topic pattern\n    pub async fn subscribe\u003cT\u003e(\u0026self, pattern: \u0026str) -\u003e Result\u003cString, AutoQueuesError\u003e\n    where\n        T: Clone + Send + Sync + Serialize + DeserializeOwned + 'static,\n    {\n        // Using localhost as default connect address for broker\n        let connect_addr = format!(\"tcp://localhost:{}\", constants::network::DEFAULT_NODE_COMMUNICATION_PORT);\n        \n        self.broker\n            .subscribe(pattern, \u0026connect_addr)\n            .await\n            .map_err(|e| AutoQueuesError::SourceError(e.to_string()))\n    }\n    \n    /// Enable persistence for a queue\n    pub fn enable_persistence(\u0026self, queue_name: \u0026str) -\u003e Result\u003c\u0026Self, AutoQueuesError\u003e {\n        self.registry.enable_persistence(queue_name)?;\n        Ok(self)\n    }\n    \n    /// Add queue with function source and persistence enabled\n    pub fn add_queue_fn_with_persistence\u003cT, F\u003e(\n        \u0026self,\n        name: \u0026str,\n        func: F,\n        interval: IntervalConfig,\n    ) -\u003e Result\u003c\u0026Self, AutoQueuesError\u003e\n    where\n        T: Clone + Send + Sync + 'static,\n        F: QueueSource\u003cT\u003e + 'static,\n    {\n        self.registry.add_queue_with_interval_and_persistence(name, func, interval, true)?;\n        Ok(self)\n    }\n    \n    /// Add expression queue with persistence enabled\n    pub fn add_queue_expr_with_persistence(\n        \u0026self,\n        name: \u0026str,\n        expression: \u0026str,\n        source_queue: \u0026str,\n        trigger_on_push: bool,\n        trigger_interval_ms: Option\u003cu64\u003e,\n    ) -\u003e Result\u003c\u0026Self, AutoQueuesError\u003e {\n        self.registry.add_expression_queue_with_persistence(\n            name,\n            expression,\n            source_queue,\n            trigger_on_push,\n            trigger_interval_ms,\n            true,\n        )?;\n        Ok(self)\n    }\n    \n    /// Graceful shutdown - flushes all persistence data\n    pub fn shutdown(\u0026self) {\n        println!(\"Shutting down AutoQueues...\");\n        \n        // Flush all persistence handles\n        self.registry.shutdown_all_persistence();\n        \n        println!(\"All data flushed to disk.\");\n    }\n}\n\n","traces":[{"line":26,"address":[8806976,8807319],"length":1,"stats":{"Line":0}},{"line":27,"address":[8807063,8807006],"length":1,"stats":{"Line":0}},{"line":28,"address":[8807146,8807105],"length":1,"stats":{"Line":0}},{"line":38,"address":[8807568],"length":1,"stats":{"Line":0}},{"line":39,"address":[8807584],"length":1,"stats":{"Line":0}},{"line":43,"address":[8807744],"length":1,"stats":{"Line":0}},{"line":44,"address":[8807752],"length":1,"stats":{"Line":0}},{"line":53,"address":[],"length":0,"stats":{"Line":0}},{"line":54,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[],"length":0,"stats":{"Li n $name() {\n                if !cfg!(debug_assertions) {\n                    $body\n                } else {\n                    println!(\n                        \"Skipping {} in debug mode (would overflow stack)\",\n                        stringify!($name)\n                    );\n                }\n            }\n        };\n    }\n\n    // Target: \u003c 5 mins total runtime\n    const RUNS: usize = 30;\n    const WARMUP: usize = 3;\n\n    /// Run benchmarks and collect statistics (avg, p95, min, max)\n    fn benchmark_with_stats\u003cF\u003e(name: \u0026str, iterations: usize, f: F)\n    where\n        F: Fn() -\u003e u128 + Copy,\n    {\n        // Warmup\n        for _ in 0..WARMUP {\n            f();\n        }\n\n        // Collect samples\n        let mut samples: Vec\u003cu128\u003e = Vec::with_capacity(iterations);\n        for _ in 0..iterations {\n            samples.push(f());\n        }\n\n        // Calculate stats\n        let total: u128 = samples.iter().sum();\n        let avg_ns = total / iterations as u128;\n        let avg_us = avg_ns as f64 / 1000.0;\n\n        let min_ns = *samples.iter().min().unwrap();\n        let max_ns = *samples.iter().max().unwrap();\n\n        // Calculate p95\n        let mut sorted = samples;\n        sorted.sort();\n        let p95_idx = (iterations * 95) / 100;\n        let p95_ns = sorted[p95_idx];\n\n        println!(\n            \"{:28} | {:\u003e8.2} us | {:\u003e8.2} us | {:\u003e8.2} us | {:\u003e8.2} us | {:\u003e8.0}-{:\u003e8.0} ns\",\n            name,\n            avg_us,\n            p95_ns as f64 / 1000.0,\n            max_ns as f64 / 1000.0,\n            min_ns as f64 / 1000.0,\n            min_ns,\n            max_ns\n        );\n    }\n\n    // ============ EXPRESSION BENCHMARKS ============\n\n    #[test]\n    fn bench_expression_compile() {\n        println!(\"\\n=== EXPRESSION EVALUATION BENCHMARKS ===\");\n        println!(\n            \"{:28} | {:\u003e8} | {:\u003e8} | {:\u003e8} | {:\u003e8} | {:\u003e17}\",\n            \"Benchmark\", \"Avg us\", \"p95 us\", \"Max us\", \"Min us\", \"Range ns\"\n        );\n        println!(\"{}\", \"-\".repeat(78));\n\n        benchmark_with_stats(\"compile_expression\", RUNS, || {\n            let start = Instant::now();\n            let _ = compile_expression(\"a + b\").unwrap();\n            start.elapsed().as_nanos()\n        });\n    }\n\n    #[test]\n    fn bench_expression_eval_simple() {\n        let vars: HashMap\u003cString, f64\u003e = vec![(\"a\", 50.0), (\"b\", 30.0)]\n            .into_iter()\n            .map(|(k, v)| (k.to_string(), v))\n            .collect();\n\n        benchmark_with_stats(\"eval_simple (a+b)\", RUNS, || {\n            let start = Instant::now();\n            let _ = evaluate_expression(\"a + b\", \u0026vars).unwrap();\n            start.elapsed().as_nanos()\n        });\n    }\n\n    #[test]\n    fn bench_expression_eval_10_vars() {\n        let mut vars = HashMap::new();\n        for i in 0..10 {\n            vars.insert(format!(\"v{}\", i), i as f64 * 10.0);\n        }\n\n        benchmark_with_stats(\"eval_10_vars\", RUNS, || {\n            let start = Instant::now();\n            let _ = evaluate_expression(\n                \"(v0 + v1 + v2 + v3 + v4 + v5 + v6 + v7 + v8 + v9) / 10.0\",\n                \u0026vars,\n            )\n            .unwrap();\n            start.elapsed().as_nanos()\n        });\n    }\n\n    // ============ SEQUENTIAL QUEUE BENCHMARKS ============\n\n    #[test]\n    fn bench_queue_creation() {\n        println!(\"\\n=== QUEUE CREATION BENCHMARKS ===\");\n        println!(\n            \"{:28} | {:\u003e8} | {:\u003e8} | {:\u003e8} | {:\u003e8} | {:\u003e17}\",\n            \"Benchmark\", \"Avg us\", \"p95 us\", \"Max us\", \"Min us\", \"Range ns\"\n        );\n        println!(\"{}\", \"-\".repeat(78));\n\n        benchmark_with_stats(\"spmc_queue_creation\", RUNS, || {\n            let start = Instant::now();\n            let _ = SPMCLockFreeQueue::\u003cf64, 1024\u003e::new();\n            start.elapsed().as_nanos()\n        });\n\n        benchmark_with_stats(\"sharded_ring_buffer_creation\", RUNS, || {\n            let start = Instant::now();\n            let _ = ShardedRingBuffer::\u003cf64, 1024\u003e::new();\n            start.elapsed().as_nanos()\n        });\n\n        benchmark_with_stats(\"lockfree_queue_creation\", RUNS, || {\n            let start = Instant::now();\n            let _ = ShardedRingBuffer::\u003cf64, 1024\u003e::new();\n            start.elapsed().as_nanos()\n        });\n    }\n\n    #[test]\n    fn bench_queue_push() {\n        println!(\"\\n=== QUEUE PUSH BENCHMARKS (1,000 items) ===\");\n        println!(\n            \"{:28} | {:\u003e8} | {:\u003e8} | {:\u003e8} | {:\u003e8} | {:\u003e17}\",\n            \"Benchmark\", \"Avg us\", \"p95 us\", \"Max us\", \"Min us\", \"Range ns\"\n        );\n        println!(\"{}\", \"-\".repeat(78));\n\n        benchmark_with_stats(\"spmc_push_1000\", RUNS, || {\n            let start = Instant::now();\n            let mut queue = SPMCLockFreeQueue::\u003cf64, 4096\u003e::new();\n            for i in 0..1000 {\n                let _ = queue.push(i as f64);\n            }\n            start.elapsed().as_nanos()\n        });\n\n        benchmark_with_stats(\"sharded_ring_buffer_push_1000\", RUNS, || {\n            let start = Instant::now();\n            let mut queue = ShardedRingBuffer::\u003cf64, 1024\u003e::new();\n            for i in 0..1000 {\n                let _ = QueueTrait::publish(\u0026mut queue, i as f64);\n            }\n            start.elapsed().as_nanos()\n        });\n\n        benchmark_with_stats(\"lockfree_push_1000\", RUNS, || {\n            let start = Instant::now();\n            let mut queue = ShardedRingBuffer::\u003cf64, 4096\u003e::new();\n            for i in 0..1000 {\n                let _ = QueueTrait::publish(\u0026mut queue, i as f64);\n            }\n            start.elapsed().as_nanos()\n        });\n    }\n\n    // ============ CORE: CONCURRENT PULL BENCHMARKS ============\n    // This is THE benchmark that shows SPMC advantage:\n    // Multiple consumers pull from the same queue concurrently\n\n    release_only_test!(bench_spmc_concurrent_pull, {\n        println!(\"\\n=== CORE: SPMC CONCURRENT PULL (10,000 items) ===\");\n        println!(\n            \"{:28} | {:\u003e8} | {:\u003e8} | {:\u003e8} | {:\u003e8} | {:\u003e17}\",\n            \"Benchmark\", \"Avg us\", \"p95 us\", \"Max us\", \"Min us\", \"Range ns\"\n        );\n        println!(\"{}\", \"-\".repeat(78));\n\n        // Reduce items and consumers to prevent stack overflow in debug builds\n        const ITEMS: usize = 10_000;\n        const CONSUMER_COUNTS: \u0026[usize] = \u0026[1, 2]; // Removed 4 consumers to reduce stress\n        const ITERATIONS: usize = 2; // Further reduced iterations from RUNS/2 = 15 to prevent stack overflow\n\n        for \u0026num_consumers in CONSUMER_COUNTS {\n            let name = format!(\"spmc_concurrent_{}pull\", num_consumers);\n            let items_per_consumer = ITEMS / num_consumers;\n\n            // Collect timing samples manually instead of using benchmark_with_stats\n            // to reduce stack pressure in debug builds with multiple thread spawns\n            let mut samples: Vec\u003cu128\u003e = Vec::with_capacity(ITERATIONS);\n\n            // Warmup run - reduce capacity to match reduced ITEM count\n            run_concurrent_pull_test(ITEMS, num_consumers);\n\n            // Collect samples\n            for _ in 0..ITERATIONS {\n                let start = Instant::now();\n                run_concurrent_pull_test(ITEMS, num_consumers);\n                samples.push(start.elapsed().as_nanos());\n            }\n\n            // Calculate stats manually\n            let total: u128 = samples.iter().sum();\n            let avg_ns = total / ITERATIONS as u128;\n            let avg_us = avg_ns as f64 / 1000.0;\n\n            let min_ns = *samples.iter().min().unwrap();\n            let max_ns = *samples.iter().max().unwrap();\n\n            // Calculate p95\n            let mut sorted = samples;\n            sorted.sort();\n            let p95_idx = (ITERATIONS * 95) / 100;\n            let p95_ns = sorted[p95_idx];\n\n            println!(\n                \"{:28} | {:\u003e8.2} us | {:\u003e8.2} us | {:\u003e8.2} us | {:\u003e8.2} us | {:\u003e8.0}-{:\u003e8.0} ns\",\n                name,\n                avg_us,\n                p95_ns as f64 / 1000.0,\n                max_ns as f64 / 1000.0,\n                min_ns as f64 / 1000.0,\n                min_ns,\n                max_ns\n            );\n        }\n    });\n\n    release_only_test!(bench_spmc_concurrent_pull_throughput, {\n        println!(\"\\n=== CORE: SPMC CONCURRENT PULL THROUGHPUT (15k items) ===\");\n        println!(\n            \"{:28} | {:\u003e10} | {:\u003e10} | {:\u003e10}\",\n            \"Benchmark\", \"Avg us\", \"Items/sec\", \"Speedup\"\n        );\n        println!(\"{}\", \"-\".repeat(62));\n\n        const ITEMS: usize = 15_000;\n        const CONSUMER_COUNTS: \u0026[usize] = \u0026[1, 2, 4];\n\n        // First, run baseline (1 consumer)\n        let items_per_consumer = ITEMS;\n        let start = Instant::now();\n\n        let mut queue = SPMCLockFreeQueue::\u003cu64, 32768\u003e::new();\n        for i in 0..ITEMS {\n            let _ = queue.push(i as u64);\n        }\n        let queue_arc = Arc::new(queue);\n\n        let mut handles = vec![];\n        for _ in 0..1 {\n            let queue = queue_arc.clone();\n            handles.push(thread::spawn(move || {\n                let consumer = queue.consumer();\n                let mut count = 0;\n                while count \u003c items_per_consumer {\n                    if let Some((_, val)) = consumer.pop() {\n                        // Simulate real work: some computation\n                        let _ = val * 2 + 1;\n                        count += 1;\n                    }\n                }\n                count\n            }));\n        }\n\n        for h in handles {\n            let _ = h.join().unwrap();\n        }\n\n        let baseline_us = start.elapsed().as_micros() as f64;\n        let baseline_items_per_sec = (ITEMS as f64 / baseline_us) * 1_000_000.0;\n        println!(\n            \"{:28} | {:\u003e10.2} | {:\u003e10.0} | {:\u003e10.1}x\",\n            \"spmc_1pull (work)\", baseline_us, baseline_items_per_sec, 1.0\n        );\n\n        // Now test with multiple consumers\n        for \u0026num_consumers in \u0026CONSUMER_COUNTS[1..] {\n            let items_per_consumer = ITEMS / num_consumers;\n            let start = Instant::now();\n\n            let mut queue = SPMCLockFreeQueue::\u003cu64, 32768\u003e::new();\n            for i in 0..ITEMS {\n                let _ = queue.push(i as u64);\n            }\n            let queue_arc = Arc::new(queue);\n\n            let mut handles = vec![];\n\n            for _ in 0..num_consumers {\n                let queue = queue_arc.clone();\n                handles.push(thread::spawn(move || {\n                    let consumer = queue.consumer();\n                    let mut count = 0;\n                    while count \u003c items_per_consumer {\n                        if let Some((_, val)) = consumer.pop() {\n                            // Simulate real work\n                            let _ = val * 2 + 1;\n                            count += 1;\n                        }\n                    }\n                    count\n                }));\n            }\n\n            for h in handles {\n                let _ = h.join().unwrap();\n            }\n\n            let elapsed_us = start.elapsed().as_micros() as f64;\n            let items_per_sec = (ITEMS as f64 / elapsed_us) * 1_000_000.0;\n            let speedup = baseline_us / elapsed_us;\n\n            println!(\n                \"{:28} | {:\u003e10.2} | {:\u003e10.0} | {:\u003e10.1}x\",\n                format!(\"spmc_{}pull (work)\", num_consumers),\n                elapsed_us,\n                items_per_sec,\n                speedup\n            );\n        }\n    });\n\n    /// Flexible scalability test\n    /// Args: min_consumers, max_consumers, scale_factor, items, ops_per_item\n    /// Example: min=2, max=20, factor=2 → runs: 2, 4, 8, 16, 20 (20 not in sequence, warns)\n    release_only_test!(bench_spmc_flexible_scalability, {\n        // Configurable parameters\n        let min_consumers: usize = 2;\n        let max_consumers: usize = 20;\n        let scale_factor: usize = 2;\n        const ITEMS: usize = 5_000;\n        const OPS_PER_ITEM: usize = 100;\n\n        println!(\n            \"\\n=== SPMC FLEXIBLE SCALABILITY ({} items, {} ops/item) ===\",\n            ITEMS, OPS_PER_ITEM\n        );\n        println!(\n            \"Config: min={}, max={}, factor={}\",\n            min_consumers, max_consumers, scale_factor\n        );\n        println!(\n            \"{:28} | {:\u003e10} | {:\u003e10} | {:\u003e10} | {:\u003e10}\",\n            \"Benchmark\", \"Avg us\", \"Items/sec\", \"Speedup\", \"Efficiency\"\n        );\n        println!(\"{}\", \"-\".repeat(72));\n\n        // Build scale sequence: min, min*factor, min*factor^2, ... until \u003e= max\n        let mut scales: Vec\u003cusize\u003e = Vec::new();\n        let mut current = min_consumers;\n        while current \u003c max_consumers {\n            scales.push(current);\n            current *= scale_factor;\n        }\n        scales.push(max_consumers); // Always include max\n\n        // Check if max was in the sequence (for warning)\n        let in_sequence = scales[..scales.len() - 1].contains(\u0026max_consumers);\n        if !in_sequence {\n            let prev = scales[scales.len() - 2];\n            let seq_str = if scales.len() \u003e 2 {\n                format!(\"{}, {}, ...\", scales[0], prev)\n            } else {\n                format!(\"{}\", scales[0])\n            };\n            println!(\n                \"⚠️  Warning: {} not in sequence ({}). Added extra run.\",\n                max_consumers, seq_str\n            );\n        }\n\n        // Run baseline (1 consumer)\n        let items_per_consumer = ITEMS;\n        let start = Instant::now();\n\n        let mut queue = SPMCLockFreeQueue::\u003cu64, 16384\u003e::new();\n        for i in 0..ITEMS {\n            let _ = queue.push(i as u64);\n        }\n        let queue_arc = Arc::new(queue);\n\n        let mut handles = vec![];\n        for _ in 0..1 {\n            let queue = queue_arc.clone();\n            handles.push(thread::spawn(move || {\n                let consumer = queue.consumer();\n                let mut count = 0;\n                while count \u003c items_per_consumer {\n                    if let Some((_, val)) = consumer.pop() {\n                        let mut result = val;\n                        for _ in 0..OPS_PER_ITEM {\n                            result = result.wrapping_mul(3).wrapping_add(1) % 1000000;\n                        }\n                        count += 1;\n                    }\n                }\n                count\n            }));\n        }\n\n        for h in handles {\n            let _ = h.join().unwrap();\n        }\n\n        let baseline_us = start.elapsed().as_micros() as f64;\n        let baseline_items_per_sec = (ITEMS as f64 / baseline_us) * 1_000.0;\n        println!(\n            \"{:28} | {:\u003e10.2} | {:\u003e10.0} | {:\u003e10.2}x | {:\u003e10.2}x\",\n            \"baseline_1consumer\", baseline_us, baseline_items_per_sec, 1.0, 1.0\n        );\n\n        // Run at each scale\n        for \u0026num_consumers in \u0026scales {\n            let items_per_consumer = ITEMS / num_consumers;\n            let start = Instant::now();\n\n            let mut queue = SPMCLockFreeQueue::\u003cu64, 16384\u003e::new();\n            for i in 0..ITEMS {\n                let _ = queue.push(i as u64);\n            }\n            let queue_arc = Arc::new(queue);\n\n            let mut handles = vec![];\n\n            for _ in 0..num_consumers {\n                let queue = queue_arc.clone();\n                handles.push(thread::spawn(move || {\n                    let consumer = queue.consumer();\n                    let mut count = 0;\n                    while count \u003c items_per_consumer {\n                        if let Some((_, val)) = consumer.pop() {\n                            let mut result = val;\n                            for _ in 0..OPS_PER_ITEM {\n                                result = result.wrapping_mul(3).wrapping_add(1) % 1000000;\n                            }\n                            count += 1;\n                        }\n                    }\n                    count\n                }));\n            }\n\n            for h in handles {\n                let _ = h.join().unwrap();\n            }\n\n            let elapsed_us = start.elapsed().as_micros() as f64;\n            let items_per_sec = (ITEMS as f64 / elapsed_us) * 1_000.0;\n            let speedup = baseline_us / elapsed_us;\n            let efficiency = speedup / num_consumers as f64;\n\n            // Highlight best result\n            let marker = if speedup \u003e 1.2 \u0026\u0026 num_consumers \u003e= 4 {\n                \" ★\"\n            } else {\n                \"\"\n            };\n\n            println!(\n                \"{:28} | {:\u003e10.2} | {:\u003e10.0} | {:\u003e10.2}x | {:\u003e10.2}x{}\",\n                format!(\"spmc_{}consumers\", num_consumers),\n                elapsed_us,\n                items_per_sec,\n                speedup,\n                efficiency,\n                marker\n            );\n        }\n    });\n\n    // ============ CONCURRENT DRAIN BENCHMARKS ============\n\n    release_only_test!(bench_spmc_concurrent_drain, {\n        println!(\"\\n=== SPMC CONCURRENT DRAIN (full queue drain time) ===\");\n        println!(\n            \"{:28} | {:\u003e8} | {:\u003e8} | {:\u003e8} | {:\u003e8} | {:\u003e17}\",\n            \"Benchmark\", \"Avg us\", \"p95 us\", \"Max us\", \"Min us\", \"Range ns\"\n        );\n        println!(\"{}\", \"-\".repeat(78));\n\n        // Reduce items and consumers to prevent stack overflow in debug builds\n        const ITEMS: usize = 1_000; // Reduced from 10,000\n        const CONSUMER_COUNTS: \u0026[usize] = \u0026[1, 2]; // Removed 4 consumers\n        const ITERATIONS: usize = 2; // Further reduced iterations\n\n        for \u0026num_consumers in CONSUMER_COUNTS {\n            let name = format!(\"spmc_drain_{}consumers\", num_consumers);\n\n            // Collect timing samples manually instead of using benchmark_with_stats\n            // to reduce stack pressure in debug builds\n            let mut samples: Vec\u003cu128\u003e = Vec::with_capacity(ITERATIONS);\n\n            // Warmup run\n            run_drain_test(ITEMS, num_consumers);\n\n            // Collect samples\n            for _ in 0..ITERATIONS {\n                let start = Instant::now();\n                run_drain_test(ITEMS, num_consumers);\n                samples.push(start.elapsed().as_nanos());\n            }\n\n            // Calculate stats manually\n            let total: u128 = samples.iter().sum();\n            let avg_ns = total / ITERATIONS as u128;\n            let avg_us = avg_ns as f64 / 1000.0;\n\n            let min_ns = *samples.iter().min().unwrap();\n            let max_ns = *samples.iter().max().unwrap();\n\n            // Calculate p95\n            let mut sorted = samples;\n            sorted.sort();\n            let p95_idx = (ITERATIONS * 95) / 100;\n            let p95_ns = sorted[p95_idx];\n\n            println!(\n                \"{:28} | {:\u003e8.2} us | {:\u003e8.2} us | {:\u003e8.2} us | {:\u003e8.2} us | {:\u003e8.0}-{:\u003e8.0} ns\",\n                name,\n                avg_us,\n                p95_ns as f64 / 1000.0,\n                max_ns as f64 / 1000.0,\n                min_ns as f ! interval_ms = 1000\n//! ```\n\nuse crate::constants;\nuse crate::queue::persistence::PersistenceConfig;\nuse serde::{Deserialize, Serialize};\nuse std::collections::HashMap;\nuse std::env;\nuse std::fs;\nuse std::net::SocketAddr;\nuse std::path::Path;\nuse thiserror::Error;\n\n/// Configuration errors\n#[derive(Debug, Error)]\npub enum ConfigError {\n    #[error(\"IO error: {0}\")]\n    Io(#[from] std::io::Error),\n\n    #[error(\"TOML parse error: {0}\")]\n    Parse(#[from] toml::de::Error),\n\n    #[error(\"TOML serialize error: {0}\")]\n    Serialize(#[from] toml::ser::Error),\n\n    #[error(\"Environment variable error: {0}\")]\n    Env(#[from] std::env::VarError),\n\n    #[error(\"Invalid value: {0}\")]\n    InvalidValue(String),\n\n    #[error(\"Node not found: {0}\")]\n    NodeNotFound(String),\n\n    #[error(\"Invalid source format: {0}\")]\n    InvalidSource(String),\n\n    #[error(\"Missing required field: {0}\")]\n    MissingField(String),\n}\n\n// ============================================================================\n// Source Types\n// ============================================================================\n\n/// Source type for local metrics\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub enum SourceType {\n    /// System function (cpu, memory, memory_free, disk)\n    Function(String),\n    /// Expression using local variable names\n    Expression(String),\n}\n\nimpl SourceType {\n    /// Parse a source string (e.g., \"function:cpu\" or \"expression:x * 2\")\n    pub fn parse(s: \u0026str) -\u003e Result\u003cSelf, ConfigError\u003e {\n        if let Some(name) = s.strip_prefix(\"function:\") {\n            Ok(Self::Function(name.to_string()))\n        } else if let Some(expr) = s.strip_prefix(\"expression:\") {\n            Ok(Self::Expression(expr.to_string()))\n        } else {\n            // Default to function\n            Ok(Self::Function(s.to_string()))\n        }\n    }\n\n    /// Get the variable name(s) used by this source\n    pub fn variables(\u0026self) -\u003e Vec\u003cString\u003e {\n        match self {\n            Self::Function(name) =\u003e vec![name.clone()],\n            Self::Expression(expr) =\u003e Self::extract_variables(expr),\n        }\n    }\n\n    /// Extract variable names from an expression\n    fn extract_variables(expr: \u0026str) -\u003e Vec\u003cString\u003e {\n        let mut vars = Vec::new();\n        let mut current = String::new();\n        let mut in_var = false;\n\n        for c in expr.chars() {\n            if c.is_alphanumeric() || c == '_' {\n                current.push(c);\n                in_var = true;\n            } else if in_var {\n                if !current.is_empty() \u0026\u0026 current != \"true\" \u0026\u0026 current != \"false\" {\n                    vars.push(current.clone());\n                }\n                current.clear();\n                in_var = false;\n            }\n        }\n\n        if in_var \u0026\u0026 !current.is_empty() {\n            vars.push(current);\n        }\n\n        vars\n    }\n}\n\n/// Aggregation type for global metrics\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub enum AggregationType {\n    #[serde(rename = \"avg\")]\n    Avg,\n    #[serde(rename = \"max\")]\n    Max,\n    #[serde(rename = \"min\")]\n    Min,\n    #[serde(rename = \"sum\")]\n    Sum,\n    #[serde(rename = \"stddev\")]\n    Stddev,\n    #[serde(rename = \"count\")]\n    Count(String),\n    #[serde(rename = \"p50\")]\n    Percentile50,\n    #[serde(rename = \"p95\")]\n    Percentile95,\n    #[serde(rename = \"p99\")]\n    Percentile99,\n}\n\nimpl AggregationType {\n    /// Parse aggregation type from string\n    pub fn from_str(s: \u0026str) -\u003e Result\u003cSelf, ConfigError\u003e {\n        match s {\n            \"avg\" =\u003e Ok(Self::Avg),\n            \"max\" =\u003e Ok(Self::Max),\n            \"min\" =\u003e Ok(Self::Min),\n            \"sum\" =\u003e Ok(Self::Sum),\n            \"stddev\" =\u003e Ok(Self::Stddev),\n            \"median\" | \"p50\" =\u003e Ok(Self::Percentile50),\n            \"p95\" =\u003e Ok(Self::Percentile95),\n            \"p99\" =\u003e Ok(Self::Percentile99),\n            s if s.starts_with(\"count:\") =\u003e {\n                let pred = s[6..].to_string();\n                Ok(Self::Count(pred))\n            }\n            _ =\u003e Err(ConfigError::InvalidValue(format!(\n                \"Unknown aggregation type: {}\",\n                s\n            ))),\n        }\n    }\n}\n\n// ============================================================================\n// Node Configuration\n// ============================================================================\n\n/// Configuration for a single node\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct NodeConfig {\n    pub host: String,\n    pub communication_port: u16,\n    pub query_port: u16,\n    pub coordination_port: u16,\n    pub pubsub_port: u16,\n}\n\nimpl NodeConfig {\n    /// Get the socket address for node communication\n    pub fn communication_addr(\u0026self) -\u003e SocketAddr {\n        format!(\"{}:{}\", self.host, self.communication_port)\n            .parse()\n            .unwrap()\n    }\n\n    /// Get the query address\n    pub fn query_addr(\u0026self) -\u003e SocketAddr {\n        format!(\"{}:{}\", self.host, self.query_port)\n            .parse()\n            .unwrap()\n    }\n\n    /// Get the coordination address\n    pub fn coordination_addr(\u0026self) -\u003e SocketAddr {\n        format!(\"{}:{}\", self.host, self.coordination_port)\n            .parse()\n            .unwrap()\n    }\n\n    /// Get the pub/sub address for metric distribution\n    pub fn pubsub_addr(\u0026self) -\u003e SocketAddr {\n        format!(\"{}:{}\", self.host, self.pubsub_port)\n            .parse()\n            .unwrap()\n    }\n}\n\n/// Raw node table from TOML (table-per-node format)\n#[derive(Debug, Clone, Serialize, Deserialize, Default)]\npub struct NodeTable {\n    #[serde \n// ============================================================================\n// Main Config Structure\n// ============================================================================\n\n/// Main configuration structure for AutoQueues\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Config {\n    /// Node table (table-per-node format)\n    #[serde(default)]\n    pub nodes: NodeTable,\n\n    /// Local metric sources\n    #[serde(default)]\n    pub local: HashMap\u003cString, String\u003e,\n\n    /// Global aggregations\n    #[serde(default)]\n    pub global: HashMap\u003cString, GlobalMetricConfig\u003e,\n\n    /// Queue settings\n    #[serde(default)]\n    pub queue: QueueConfig,\n\n    /// Debug settings\n    #[serde(default)]\n    pub debug: DebugConfig,\n\n    /// Persistence settings\n    #[serde(default)]\n    pub persistence: Option\u003cPersistenceConfig\u003e,\n}\n\n/// Queue-specific configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct QueueConfig {\n    #[serde(default = \"queue_default_capacity\")]\n    pub capacity: usize,\n    #[serde(default = \"queue_default_interval\")]\n    pub default_interval: u64,\n}\n\nfn queue_default_capacity() -\u003e usize {\n    constants::config::DEFAULT_CAPACITY\n}\n\nfn queue_default_interval() -\u003e u64 {\n    constants::config::DEFAULT_INTERVAL_MS\n}\n\nimpl Default for QueueConfig {\n    fn default() -\u003e Self {\n        Self {\n            capacity: queue_default_capacity(),\n            default_interval: queue_default_interval(),\n        }\n    }\n}\n\n// ============================================================================\n// Builder Pattern\n// ============================================================================\n\n/// Builder for Config\n#[derive(Debug)]\npub struct ConfigBuilder {\n    config: Config,\n}\n\nimpl Default for ConfigBuilder {\n    fn default() -\u003e Self {\n        Self {\n            config: Config::default(),\n        }\n    }\n}\n\nimpl ConfigBuilder {\n    /// Create a new builder\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    /// Add a node\n    pub fn add_node(\n        mut self,\n        name: \u0026str,\n        host: \u0026str,\n        communication_port: u16,\n        query_port: u16,\n        coordination_port: u16,\n        pubsub_port: u16,\n    ) -\u003e Self {\n        let node_config = NodeConfig {\n            host: host.to_string(),\n            communication_port,\n            query_port,\n            coordination_port,\n            pubsub_port,\n        };\n\n        self.config\n            .nodes\n            .nodes\n            .insert(name.to_string(), node_config);\n\n        self\n    }\n\n    /// Add a local metric source\n    pub fn add_local_metric(mut self, name: \u0026str, source: \u0026str) -\u003e Self {\n        self.config\n            .local\n            .insert(name.to_string(), source.to_string());\n        self\n    }\n\n    /// Add a global aggregation\n    pub fn add_global_aggregation(\n        mut self,\n        name: \u0026str,\n        aggregation: \u0026str,\n        sources: \u0026[\u0026str],\n        interval_ms: u64,\n    ) -\u003e Self {\n        self.config.global.insert(\n            name.to_string(),\n            GlobalMetricConfig {\n                aggregation: aggregation.to_string(),\n                sources: sources.iter().map(|s| s.to_string()).collect(),\n                interval_ms,\n                expression: None,\n            },\n        );\n        self\n    }\n\n    /// Add an expression-based aggregation\n    pub fn add_expression_aggregation(\n        mut self,\n        name: \u0026str,\n        expression: \u0026str,\n        aggregation: \u0026str,\n        sources: \u0026[\u0026str],\n        interval_ms: u64,\n    ) -\u003e Self {\n        self.config.global.insert(\n            name.to_string(),\n            GlobalMetricConfig {\n                aggregation: aggregation.to_string(),\n                sources: sources.iter().map(|s| s.to_string()).collect(),\n                interval_ms,\n                expression: Some(expression.to_string()),\n            },\n        );\n        self\n    }\n\n    /// Set queue capacity\n    pub fn capacity(mut self, capacity: usize) -\u003e Self {\n        self.config.queue.capacity = capacity;\n        self\n    }\n\n    /// Set default interval\n    pub fn default_interval(mut self, interval_ms: u64) -\u003e Self {\n        self.config.queue.default_interval = interval_ms;\n        self\n    }\n\n    /// Enable sensor simulation\n    pub fn simulate_sensors(mut self, enabled: bool) -\u003e Self {\n        self.config.debug.simulate_sensors = enabled;\n        self\n    }\n\n    /// Enable verbose mode\n    pub fn verbose(mut self, enabled: bool) -\u003e Self {\n        self.config.debug.verbose = enabled;\n        self\n    }\n\n    /// Set persistence configuration\n    pub fn persistence(mut self, config: PersistenceConfig) -\u003e Self {\n        self.config.persistence = Some(config);\n        self\n    }\n\n    /// Build the configuration\n    pub fn build(self) -\u003e Config {\n        self.config\n    }\n}\n\nimpl Config {\n    /// Create a new config with defaults\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    /// Create a builder\n    pub fn builder() -\u003e ConfigBuilder {\n        ConfigBuilder::new()\n    }\n\n    /// Load configuration from a TOML file\n    pub fn load(path: impl AsRef\u003cPath\u003e) -\u003e Result\u003cSelf, ConfigError\u003e {\n        let content = fs::read_to_string(path)?;\n        Ok(toml::from_str(\u0026content)?)\n    }\n\n    /// Save configuration to a TOML file\n    pub fn save(\u0026self, path: impl AsRef\u003cPath\u003e) -\u003e Result\u003c(), ConfigError\u003e {\n        let content = toml::to_string_pretty(self)?;\n        fs::write(path, content)?;\n        Ok(())\n    }\n\n    /// Get my node configuration based on NODE_ID environment variable\n    pub fn my_node(\u0026self, node_id: u64) -\u003e Result\u003cNodeConfig, ConfigError\u003e {\n        let node_name = format!(\"node{}\", node_id);\n        self.nodes\n            .nodes\n            .get(\u0026node_name)\n            .cloned()\n            .ok_or_else(|| ConfigError::NodeNotFound(node_name))\n    }\n\n    /// Get all other nodes (excluding self)\n    pub fn other_nodes(\u0026self, node_id: u64) -\u003e Vec\u003c(String, NodeConfig)\u003e {\n        self.nodes\n            .collect_nodes()\n            .into_iter()\n            .filter(|(name, _)| name != \u0026format!(\"node{}\", node_id))\n            .collect()\n    }\n\n    /// Get all nodes\n    pub fn all_nodes(\u0026self) -\u003e Vec\u003c(String, NodeConfig)\u003e {\n        self.nodes.collect_nodes()\n    }\n\n    /// Detect node ID from environment or hostname\n    pub fn detect_node_id(\u0026self) -\u003e Result\u003cu64, ConfigError\u003e {\n        // First check NODE_ID environment variable\n        if let Ok(id) = env::var(\"NODE_ID\") {\n            return id\n                .parse()\n                .map_err(|_| ConfigError::InvalidValue(\"Invalid NODE_ID\".to_string()));\n        }\n\n        // Otherwise use hostname lookup\n        let hostname = env::var(\"HOSTNAME\")\n            .or_else(|_| env::var(\"HOST\"))\n            .map_err(|_| ConfigError::InvalidValue(\"Cannot determine hostname\".to_string()))?;\n\n        for (i, (name, _)) in self.all_nodes().iter().enumerate() {\n            // Simple case-insensitive match\n            if name.to_lowercase() == hostname.to_lowercase() {\n                return Ok((i + 1) as u64);\n            }\n            // Also check if hostname matches the host field\n            if let Some(config) = self.my_node((i + 1) as u64).ok() {\n                if config.host == hostname {\n                    return Ok((i + 1) as u64);\n                }\n            }\n        }\n\n        Err(ConfigError::InvalidValue(format!(\n            \"Hostname '{}' not found in node list\",\n            hostname\n        )))\n    }\n\n    /// Get local metric source\n    pub fn local_source(\u0026self, name: \u0026str) -\u003e Option\u003cSourceType\u003e {\n        self.local.get(name).map(|s| SourceType::parse(s).unwrap())\n    }\n\n    /// Get global metric configuration\n    pub fn global_metric(\u0026self, name: \u0026str) -\u003e Option\u003c\u0026GlobalMetricConfig\u003e {\n        self.global.get(name)\n    }\n}\n\nimpl Default for Config {\n    fn default() -\u003e Self {\n        Self {\n            nodes: NodeTable::default(),\n            local: HashMap::new(),\n            global: HashMap::new(),\n            queue: QueueConfig::default(),\n            debug: DebugConfig::default(),\n            persistence: None,\n        }\n    }\n}\n\n// ============================================================================\n// Config Generator\n// ============================================================================\n\n/// Helper to generate example configurations\npub struct ConfigGenerator;\n\nimpl ConfigGenerator {\n    /// Generate a local test config with 3 nodes on localhost\n    pub fn local_test(num_nodes: u64, base_port: u16) -\u003e Config {\n        let mut config = Config::new();\n        let port_offset = 100;\n\n        for i in 1..=num_nodes {\n            let name = format!(\"node{}\", i);\n            let port = base_port + (i as u16 * port_offset);\n\n            config.nodes.nodes.insert(\n                name,\n                NodeConfig {\n                    host: \"127.0.0.1\".to_string(),\n                    communication_port: port,\n                    query_port: port + 2,\n                    coordination_port: port + 3,\n                    pubsub_port: port + 4,\n                },\n            );\n        }\n\n        // Add common local metrics\n        config\n            .local\n            .insert(\"cpu\".to_string(), \"function:cpu\".to_string());\n        config\n            .local\n            .insert(\"memory\".to_string(), \"function:memory\".to_string());\n        config.local.insert(\n            \"memory_free\".to_string(),\n            \"function:memory_free\".to_string(),\n        );\n        config.local.insert(\n            \"temperature\".to_string(),\n            \"function:sensor_temp\".to_string(),\n        );\n\n        // Add global aggregations\n        config.global.insert(\n            \"cpu_avg\".to_string(),\n            GlobalMetricConfig {\n                aggregation: \"avg\".to_string(),\n                sources: vec![\"cpu\".to_string()],\n                interval_ms: 1000,\n                expression: None,\n            },\n        );\n\n        config.global.insert(\n            \"temperature_max\".to_string(),\n            GlobalMetricConfig {\n                aggregation: \"max\".to_string(),\n                sources: vec![\"temperature\".to_string()],\n                interval_ms: 2000,\n                expression: None,\n            },\n        );\n\n        config.global.insert(\n            \"node_health_score\".to_string(),\n            GlobalMetricConfig {\n                aggregation: \"avg\".to_string(),\n                sources: vec![\"cpu\".to_string(), \"memory_free\".to_string()],\n                interval_ms: 1000,\n                expression: Some(\"(100 - cpu) + memory_free\".to_string()),\n            },\n        );\n\n        // Debug settings for testing\n        config.debug.simulate_sensors = true;\n        config.debug.verbose = true;\n\n        config\n    }\n\n    /// Generate a production config with the given nodes\n    pub fn production(nodes: \u0026[(\u0026str, \u0026str)]) -\u003e Config\n    where\n        for\u003c'a\u003e \u0026'a str: std::fmt::Display,\n    {\n        let mut config = Config::new();\n\n        for (i, (name, host)) in nodes.iter().enumerate() {\n            let port = 6967 + (i as u16 * 100);\n\n            config.nodes.nodes.insert(\n
