Sync {\n    /// Connect to remote address\n    async fn connect(\u0026mut self, addr: \u0026str) -\u003e Result\u003cConnectionInfo, TransportError\u003e;\n\n    /// Send data with zero-copy semantics\n    async fn send(\u0026mut self, data: \u0026[u8]) -\u003e Result\u003c(), TransportError\u003e;\n\n    /// Receive data with zero-copy semantics\n    async fn receive(\u0026mut self) -\u003e Result\u003cVec\u003cu8\u003e, TransportError\u003e;\n\n    /// Check if transport is connected\n    fn is_connected(\u0026self) -\u003e bool;\n\n    /// Get connection information\n    fn connection_info(\u0026self) -\u003e Option\u003cConnectionInfo\u003e;\n}\n\n/// Raft network connection trait for cluster coordination\n///\n/// NOTE: Full implementation will be done in Phase 2.\n/// This defines the interface for openraft network transport.\n#[async_trait::async_trait]\npub trait RaftNetworkConnection: Send + Sync {\n    /// Send append entries RPC to a peer\n    async fn send_append_entries(\n        \u0026self,\n        target: u64,\n        rpc: openraft::raft::AppendEntriesRequest\u003ccrate::cluster::types::TypeConfig\u003e,\n    ) -\u003e Result\u003copenraft::raft::AppendEntriesResponse\u003cu64\u003e, Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e;\n\n    /// Send vote request RPC to a peer\n    async fn send_vote(\n        \u0026self,\n        target: u64,\n        rpc: openraft::raft::VoteRequest\u003cu64\u003e,\n    ) -\u003e Result\u003copenraft::raft::VoteResponse\u003cu64\u003e, Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e;\n\n    /// Send install snapshot RPC to a peer\n    async fn send_install_snapshot(\n        \u0026self,\n        target: u64,\n        rpc: openraft::raft::InstallSnapshotRequest\u003ccrate::cluster::types::TypeConfig\u003e,\n    ) -\u003e Result\u003copenraft::raft::InstallSnapshotResponse\u003cu64\u003e, Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e;\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","neeraj","syncthing","Darkforce","Sync","Git_repos","autoqueues","src","node.rs"],"content":"//! AutoQueues Node\n//!\n//! Main node implementation that collects local metrics,\n//! publishes them via ZMQ, and aggregates global metrics.\n\nuse crate::config::{Config, GlobalMetricConfig, NodeConfig};\nuse crate::constants;\nuse crate::network::pubsub::zmq::{ZmqPubSubBroker, ZmqPubSubClient};\nuse serde::{Deserialize, Serialize};\nuse std::collections::HashMap;\nuse std::net::SocketAddr;\nuse std::sync::Arc;\nuse std::time::Duration;\nuse tokio::sync::RwLock;\nuse tokio::time::interval;\n\n/// Remote metric value with source information\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct RemoteMetric {\n    pub node_id: u64,\n    pub metric_name: String,\n    pub value: f64,\n    pub timestamp: u64,\n}\n\n/// Message format for metric publication\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct MetricMessage {\n    pub node_id: u64,\n    pub metric_name: String,\n    pub value: f64,\n    pub timestamp: u64,\n}\n\n/// Aggregation helper functions\nmod aggregation {\n\n    /// Compute average of values\n    pub fn avg(values: \u0026[f64]) -\u003e f64 {\n        if values.is_empty() {\n            0.0\n        } else {\n            values.iter().sum::\u003cf64\u003e() / values.len() as f64\n        }\n    }\n\n    /// Compute maximum of values\n    pub fn max(values: \u0026[f64]) -\u003e f64 {\n        values.iter().cloned().fold(f64::NEG_INFINITY, f64::max)\n    }\n\n    /// Compute minimum of values\n    pub fn min(values: \u0026[f64]) -\u003e f64 {\n        values.iter().cloned().fold(f64::INFINITY, f64::min)\n    }\n\n    /// Compute sum of values\n    pub fn sum(values: \u0026[f64]) -\u003e f64 {\n        values.iter().sum()\n    }\n\n    /// Compute percentile (p95, p99, etc.)\n    pub fn percentile(values: \u0026mut Vec\u003cf64\u003e, p: f64) -\u003e f64 {\n        if values.is_empty() {\n            return 0.0;\n        }\n        values.sort_by(|a, b| a.partial_cmp(b).unwrap());\n        let index = (p / 100.0 * (values.len() - 1) as f64).round() as usize;\n        values[index.min(values.len() - 1)]\n    }\n\n    /// Compute health score: (100 - cpu) + memory_free\n    #[allow(dead_code)]\n    pub fn health_score(cpu: f64, memory_free: f64) -\u003e f64 {\n        (100.0 - cpu) + memory_free\n    }\n}\n\npub struct AutoQueuesNode {\n    pub node_id: u64,\n    pub local_values: Arc\u003cRwLock\u003cHashMap\u003cString, f64\u003e\u003e\u003e,\n    pub global_values: Arc\u003cRwLock\u003cHashMap\u003cString, f64\u003e\u003e\u003e,\n    pub remote_values: Arc\u003cRwLock\u003cHashMap\u003cString, HashMap\u003cu64, f64\u003e\u003e\u003e\u003e, // metric -\u003e node_id -\u003e value\n    pub running: Arc\u003cRwLock\u003cbool\u003e\u003e,\n    pub config: Config,\n    pub my_config: NodeConfig,\n    pub publisher: Arc\u003cRwLock\u003cOption\u003cZmqPubSubBroker\u003e\u003e\u003e,\n    pub client: Arc\u003cRwLock\u003cOption\u003cZmqPubSubClient\u003e\u003e\u003e,\n}\n\nimpl AutoQueuesNode {\n    pub async fn new(config: \u0026Config) -\u003e Result\u003cSelf, Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n        let node_id = config.detect_node_id()?;\n        let my_config = config.my_node(node_id)?;\n\n        // Create ZMQ pub/sub broker for publishing metrics\n        let pubsub_addr = format!(\"tcp://*:{}\", my_config.pubsub_port);\n        let publisher = ZmqPubSubBroker::with_bind_addr(\u0026pubsub_addr).map_err(|e| {\n            Box::new(std::io::Error::new(\n                std::io::ErrorKind::Other,\n                e.to_string(),\n            ))\n        })?;\n\n        // Create pub/sub client for subscribing to other nodes\n        let client = ZmqPubSubClient::new().map_err(|e| {\n            Box::new(std::io::Error::new(\n                std::io::ErrorKind::Other,\n                e.to_string(),\n            ))\n        })?;\n\n        Ok(Self {\n            node_id,\n            local_values: Arc::new(RwLock::new(HashMap::new())),\n            global_values: Arc::new(RwLock::new(HashMap::new())),\n            remote_values: Arc::new(RwLock::new(HashMap::new())),\n            running: Arc::new(RwLock::new(false)),\n            config: config.clone(),\n            my_config,\n            publisher: Arc::new(RwLock::new(Some(publisher))),\n            client: Arc::new(RwLock::new(Some(client))),\n        })\n    }\n\n    pub fn node_id(\u0026self) -\u003e u64 {\n        self.node_id\n    }\n\n    pub async fn run(\n        \u0026self,\n        config: \u0026Config,\n    ) -\u003e Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n        println!(\n            \"Starting AutoQueues node {} on pubsub port {}\",\n            self.node_id, self.my_config.pubsub_port\n        );\n        *self.running.write().await = true;\n\n        // Clone for each background task\n        let node_id = self.node_id;\n        let publisher = self.publisher.clone();\n        let client = self.client.clone();\n        let running = self.running.clone();\n\n        // Spawn metric collection and publishing task\n        let local_values_pub = self.local_values.clone();\n        tokio::spawn(async move {\n            if let Err(e) =\n                Self::collect_and_publish(node_id, local_values_pub, publisher, running).await\n            {\n                eprintln!(\"Publisher error: {}\", e);\n            }\n        });\n\n        // Spawn subscription and receive task\n        let remote_values_sub = self.remote_values.clone();\n        let running_sub = self.running.clone();\n        let other_nodes: Vec\u003cSocketAddr\u003e = config\n            .other_nodes(node_id)\n            .into_iter()\n            .map(|(_, cfg)| cfg.pubsub_addr())\n            .collect();\n\n        tokio::spawn(async move {\n            if let Err(e) = Self::subscribe_and_receive(\n                node_id,\n                client,\n                remote_values_sub,\n                other_nodes,\n                running_sub,\n            )\n            .await\n            {\n                eprintln!(\"Subscriber error: {}\", e);\n            }\n        });\n\n        // Spawn global aggregation task - uses config-defined aggregations\n        let local_values_agg = self.local_values.clone();\n        let remote_values_agg = self.remote_values.clone();\n        let global_values_agg = self.global_values.clone();\n        let running_agg = self.running.clone();\n        let global_config = config.global.clone();\n\n        tokio::spawn(async move {\n            if let Err(e) = Self::aggregate_global(\n                local_values_agg,\n                remote_values_agg,\n                global_values_agg,\n                global_config,\n                running_agg,\n            )\n            .await\n            {\n                eprintln!(\"Aggregator error: {}\", e);\n            }\n        });\n\n        println!(\"Node {} running. Press Ctrl+C to stop.\", node_id);\n        tokio::signal::ctrl_c().await?;\n        *self.running.write().await = false;\n        println!(\"Node {} stopped\", node_id);\n        Ok(())\n    }\n\n    /// Collect local metrics and publish them\n    async fn collect_and_publish(\n        node_id: u64,\n        local_values: Arc\u003cRwLock\u003cHashMap\u003cString, f64\u003e\u003e\u003e,\n        publisher: Arc\u003cRwLock\u003cOption\u003cZmqPubSubBroker\u003e\u003e\u003e,\n        running: Arc\u003cRwLock\u003cbool\u003e\u003e,\n    ) -\u003e Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n        let mut interval = interval(Duration::from_millis(constants::time::METRICS_INTERVAL_MS));\n        let mut tick_count = 0u64;\n\n        while *running.read().await {\n            interval.tick().await;\n            tick_count += 1;\n\n            // Simple deterministic pseudo-random based on time and node_id\n            // This avoids Send+Sync issues with RNG\n            let time_factor = (tick_count % 60) as f64 / 60.0;\n            let noise = ((node_id * 7919 + tick_count % 100) as f64 / 100.0) - 0.5;\n\n            // Simulate local metric collection (would use sysinfo in real code)\n            let cpu = 40.0 + (node_id as f64 * 5.0) + (noise * 10.0);\n            let memory = 50.0 + (node_id as f64 * 3.0) + (noise * 8.0);\n            let memory_free = 100.0 - memory;\n            let temperature = 60.0 + (node_id as f64 * 2.0) + (time_factor * 5.0);\n            let vibration = 10.0 + (noise * 5.0);\n\n            let mut l = local_values.write().await;\n            l.insert(\"cpu\".to_string(), cpu);\n            l.insert(\"memory\".to_string(), memory);\n            l.insert(\"memory_free\".to_string(), memory_free);\n            l.insert(\"temperature\".to_string(), temperature);\n            l.insert(\"vibration\".to_string(), vibration);\n\n            // Publish metrics to cluster\n            let publisher_guard = publisher.read().await;\n            if let Some(broker) = \u0026*publisher_guard {\n                let timestamp = std::time::SystemTime::now()\n                    .duration_since(std::time::UNIX_EPOCH)?\n                    .as_millis() as u64;\n\n                for (name, value) in \u0026*l {\n                    let msg = MetricMessage {\n                        node_id,\n                        metric_name: name.clone(),\n                        value: *value,\n                        timestamp,\n                    };\n\n                    let topic = format!(\"metric:{}\", name);\n                    if let Err(e) = broker.publish(\u0026topic, \u0026msg) {\n                        eprintln!(\"Failed to publish {}: {}\", topic, e);\n                    }\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Subscribe to other nodes and receive their metrics\n    async fn subscribe_and_receive(\n        _node_id: u64,\n        client: Arc\u003cRwLock\u003cOption\u003cZmqPubSubClient\u003e\u003e\u003e,\n        remote_values: Arc\u003cRwLock\u003cHashMap\u003cString, HashMap\u003cu64, f64\u003e\u003e\u003e\u003e,\n        other_nodes: Vec\u003cSocketAddr\u003e,\n        running: Arc\u003cRwLock\u003cbool\u003e\u003e,\n    ) -\u003e Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n        // Subscribe to all metric topics from each node\n        let mut subscriber_ids = Vec::new();\n\n        {\n            let client_guard = client.read().await;\n            if let Some(cl) = \u0026*client_guard {\n                for addr in \u0026other_nodes {\n                    let addr_str = addr.to_string();\n                    // Subscribe to all metric topics\n                    if let Ok(id) = cl.subscribe(\"metric:\", \u0026addr_str) {\n                        subscriber_ids.push(id);\n                    }\n                }\n            }\n        }\n\n        let mut interval = interval(Duration::from_millis(\n            constants::time::SHORT_SLEEP_INTERVAL_MS,\n        ));\n\n        while *running.read().await {\n            interval.tick().await;\n\n            let client_guard = client.read().await;\n            if let Some(cl) = \u0026*client_guard {\n                for sub_id in \u0026subscriber_ids {\n                    while let Ok(Some((topic, data))) = cl.receive(sub_id) {\n                        if let Ok(msg) = serde_json::from_slice::\u003cMetricMessage\u003e(\u0026data) {\n                            // Parse topic to get metric name (format: \"metric:cpu\")\n                            let metric_name = topic.strip_prefix(\"metric:\").unwrap_or(\u0026topic);\n\n                            let mut r = remote_values.write().await;\n                            r.entry(metric_name.to_string())\n                                .or_insert_with(HashMap::new)\n                                .insert(msg.node_id, msg.value);\n                        }\n                    }\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Compute global aggregations from config-defined global metrics\n    async fn aggregate_global(\n        local_values: Arc\u003cRwLock\u003cHashMap\u003cString, f64\u003e\u003e\u003e,\n        remote_values: Arc\u003cRwLock\u003cHashMap\u003cString, HashMap\u003cu64, f64\u003e\u003e\u003e\u003e,\n        global_values: Arc\u003cRwLock\u003cHashMap\u003cString, f64\u003e\u003e\u003e,\n        global_config: HashMap\u003cString, GlobalMetricConfig\u003e,\n        running: Arc\u003cRwLock\u003cbool\u003e\u003e,\n    ) -\u003e Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n        let mut interval = interval(Duration::from_millis(\n            constants::time::AGGREGATION_INTERVAL_MS,\n        ));\n\n        while *running.read().await {\n            interval.tick().await;\n\n            let local = local_values.read().await;\n            let remote = remote_values.read().await;\n\n            // Process each global metric from config\n            for (name, config) in \u0026global_config {\n                let values = Self::collect_all_values(\u0026local, \u0026remote, \u0026config.sources);\n\n                let result = match config.aggregation.as_str() {\n                    \"avg\" =\u003e aggregation::avg(\u0026values),\n                    \"max\" =\u003e aggregation::max(\u0026values),\n                    \"min\" =\u003e aggregation::min(\u0026values),\n                    \"sum\" =\u003e aggregation::sum(\u0026values),\n                    \"p95\" =\u003e aggregation::percentile(\u0026mut values.clone(), 95.0),\n                    \"p99\" =\u003e aggregation::percentile(\u0026mut values.clone(), 99.0),\n                    \"p50\" | \"median\" =\u003e aggregation::percentile(\u0026mut values.clone(), 50.0),\n                    _ =\u003e {\n                        // Check for expression-based aggregation\n                        if let Some(ref expr) = config.expression {\n                            Self::compute_expression(\u0026local, \u0026remote, expr, \u0026config.sources)\n                        } else {\n                            0.0\n                        }\n                    }\n                };\n\n                let mut g = global_values.write().await;\n                g.insert(name.clone(), result);\n            }\n        }\n\n        Ok(())\n    }\n\n    /// Collect all values (local + remote) for given sources\n    fn collect_all_values\u003c'a\u003e(\n        local: \u0026HashMap\u003cString, f64\u003e,\n        remote: \u0026HashMap\u003cString, HashMap\u003cu64, f64\u003e\u003e,\n        sources: \u0026[String],\n    ) -\u003e Vec\u003cf64\u003e {\n        let mut values = Vec::new();\n\n        for source in sources {\n            // Add local value if present\n            if let Some(\u0026v) = local.get(source) {\n                values.push(v);\n            }\n\n            // Add remote values from all nodes\n            if let Some(nodes) = remote.get(source) {\n                for \u0026v in nodes.values() {\n                    values.push(v);\n                }\n            }\n        }\n\n        values\n    }\n\n    /// Compute expression-based aggregation\n    fn compute_expression(\n        local: \u0026HashMap\u003cString, f64\u003e,\n        remote: \u0026HashMap\u003cString, HashMap\u003cu64, f64\u003e\u003e,\n        expression: \u0026str,\n        sources: \u0026[String],\n    ) -\u003e f64 {\n        // For expression aggregations, compute local first, then avg across nodes\n        let local_value = Self::eval_expression(local, expression);\n\n        // Collect expression values from all nodes\n        let mut all_values = vec![local_value];\n\n        // Get remote values for each source and compute\n        for source in sources {\n            if let Some(nodes) = remote.get(source) {\n                for (\u0026_node_id, \u0026value) in nodes {\n                    // For now, just collect the source values\n                    // A full implementation would evaluate the expression per node\n                    all_values.push(value);\n                }\n            }\n        }\n\n        // Return average of collected values as proxy\n        // In a full implementation, each node would evaluate the expression\n        aggregation::avg(\u0026all_values)\n    }\n\n    /// Simple expression evaluator for health_score pattern\n    fn eval_expression(local: \u0026HashMap\u003cString, f64\u003e, expression: \u0026str) -\u003e f64 {\n        // Handle common patterns like \"(100 - cpu) + memory_free\"\n        if expression.contains(\"100 - cpu\") \u0026\u0026 expression.contains(\"memory_free\") {\n            let cpu = local.get(\"cpu\").copied().unwrap_or(0.0);\n            let memory_free = local.get(\"memory_free\").copied().unwrap_or(0.0);\n            return (100.0 - cpu) + memory_free;\n        }\n\n        // Default: sum of referenced sources\n        let mut sum = 0.0;\n        for source in [\"cpu\", \"memory\", \"temperature\", \"vibration\"] {\n            if expression.contains(source) {\n                if let Some(\u0026v) = local.get(source) {\n                    sum += v;\n                }\n            }\n        }\n        sum\n    }\n}\n\npub async fn start_node(path: \u0026str) -\u003e Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n    let config = Config::load(path)?;\n    let node = AutoQueuesNode::new(\u0026config).await?;\n    node.run(\u0026config).await\n}\n","traces":[{"line":39,"address":[8886784],"length":1,"stats":{"Line":0}},{"line":40,"address":[8559287,8559384],"length":1,"stats":{"Line":0}},{"line":41,"address":[8559386],"length":1,"stats":{"Line":0}},{"line":43,"address":[8559306],"length":1,"stats":{"Line":0}},{"line":48,"address":[8559408],"length":1,"stats":{"Line":0}},{"line":49,"address":[8886942],"length":1,"stats":{"Line":0}},{"line":53,"address":[8  u64,\n        /// Additive increase step (decrease interval by this much on success)\n        additive_step_ms: u64,\n        /// Multiplicative decrease factor (multiply interval by this on overflow)\n        /// Should be \u003e 1.0, typically 2.0\n        multiplicative_factor: f64,\n    },\n}\n\nimpl Default for IntervalConfig {\n    fn default() -\u003e Self {\n        Self::Constant(1000) // Default 1 second\n    }\n}\n\n/// AIMD controller for adaptive polling\npub struct AimdController {\n    config: IntervalConfig,\n    current_interval_ms: u64,\n    consecutive_successes: u32,\n}\n\nimpl AimdController {\n    pub fn new(config: IntervalConfig) -\u003e Self {\n        let initial_ms = match \u0026config {\n            IntervalConfig::Constant(ms) =\u003e *ms,\n            IntervalConfig::Adaptive { initial_ms, .. } =\u003e *initial_ms,\n        };\n\n        Self {\n            config,\n            current_interval_ms: initial_ms,\n            consecutive_successes: 0,\n        }\n    }\n\n    /// Get current interval duration\n    pub fn interval(\u0026self) -\u003e Duration {\n        Duration::from_millis(self.current_interval_ms)\n    }\n\n    /// Called when poll succeeds (data pushed to queue without overflow)\n    /// Additively decreases interval (polls faster)\n    pub fn on_success(\u0026mut self) {\n        match \u0026self.config {\n            IntervalConfig::Constant(_) =\u003e {} // No change for constant\n            IntervalConfig::Adaptive {\n                min_ms,\n                additive_step_ms,\n                ..\n            } =\u003e {\n                self.consecutive_successes += 1;\n                // Additively decrease interval (poll faster)\n                if self.current_interval_ms \u003e *min_ms {\n                    self.current_interval_ms =\n                        self.current_interval_ms.saturating_sub(*additive_step_ms);\n                    self.current_interval_ms = self.current_interval_ms.max(*min_ms);\n                }\n            }\n        }\n    }\n\n    /// Called when poll fails or queue overflows\n    /// Multiplicatively increases interval (polls slower)\n    pub fn on_overflow(\u0026mut self) {\n        match \u0026self.config {\n            IntervalConfig::Constant(_) =\u003e {} // No change for constant\n            IntervalConfig::Adaptive {\n                max_ms,\n                multiplicative_factor,\n                ..\n            } =\u003e {\n                self.consecutive_successes = 0;\n                // Multiplicatively increase interval (poll slower)\n                let new_interval = (self.current_interval_ms as f64 * multiplicative_factor) as u64;\n                self.current_interval_ms = new_interval.min(*max_ms);\n            }\n        }\n    }\n\n    /// Get current interval for reporting/debugging\n    pub fn current_interval_ms(\u0026self) -\u003e u64 {\n        self.current_interval_ms\n    }\n}\n","traces":[{"line":32,"address":[9607392],"length":1,"stats":{"Line":0}},{"line":33,"address":[9552083],"length":1,"stats":{"Line":0}},{"line":45,"address":[9551248],"length":1,"stats":{"Line":0}},{"line":46,"address":[9551267],"length":1,"stats":{"Line":0}},{"line":47,"address":[9606621],"length":1,"stats":{"Line":0}},{"line":48,"address":[9551281],"length":1,"stats":{"Line":0}},{"line":59,"address":[9606704],"length":1,"stats":{"Line":0}},{"line":60,"address":[9551397],"length":1,"stats":{"Line":0}},{"line":65,"address":[7662496],"length":1,"stats":{"Line":0}},{"line":66,"address":[7662510],"length":1,"stats":{"Line":0}},{"line":68,"address":[9550860],"length":1,"stats":{"Line":0}},{"line":73,"address":[9606225,9606189,9606239],"length":1,"stats":{"Line":0}},{"line":75,"address":[9550916,9551003],"length":1,"stats":{"Line":0}},{"line":76,"address":[9606286],"length":1,"stats":{"Line":0}},{"line":77,"address":[9606262],"length":1,"stats":{"Line":0}},{"line":78,"address":[9550978],"length":1,"stats":{"Line":0}},{"line":86,"address":[960 (N.is_power_of_two(), \"Queue capacity must be a power of 2\");\n\n        let mut buffer = Vec::with_capacity(N);\n        for _ in 0..N {\n            buffer.push(std::sync::RwLock::new(None));\n        }\n\n        Self {\n            buffer,\n            mask: N - 1,\n            head: AtomicUsize::new(0),\n            tail: AtomicUsize::new(0),\n        }\n    }\n\n    /// Get the current capacity of the queue\n    pub fn capacity(\u0026self) -\u003e usize {\n        N\n    }\n\n    /// Check if the queue is empty\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.head.load(Ordering::Acquire) == self.tail.load(Ordering::Acquire)\n    }\n\n    /// Check if the queue is full\n    pub fn is_full(\u0026self) -\u003e bool {\n        let head = self.head.load(Ordering::Acquire);\n        let tail = self.tail.load(Ordering::Acquire);\n        (tail.wrapping_add(1)) \u0026 self.mask == head\n    }\n\n    /// Get the current number of items in the queue\n    fn get_size_internal(\u0026self) -\u003e usize {\n        let head = self.head.load(Ordering::Acquire);\n        let tail = self.tail.load(Ordering::Acquire);\n        tail.wrapping_sub(head) \u0026 self.mask\n    }\n}\n\nimpl\u003cT: Clone + Send + Sync + 'static, const N: usize\u003e Default for ShardedRingBuffer\u003cT, N\u003e {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl\u003cT: Clone + Send + Sync + 'static, const N: usize\u003e QueueTrait for ShardedRingBuffer\u003cT, N\u003e {\n    type Data = T;\n\n    /// Publish data to the queue\n    fn publish(\u0026mut self, data: Self::Data) -\u003e Result\u003c(), QueueError\u003e {\n        let timestamp = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap_or_default()\n            .as_millis() as Timestamp;\n\n        let queue_data = (timestamp, data);\n\n        // Get current tail position\n        let mut current_tail = self.tail.load(Ordering::Acquire);\n\n        loop {\n            // Calculate next tail position\n            let next_tail = (current_tail + 1) \u0026 self.mask;\n\n            // Check if queue is full\n            if next_tail == self.head.load(Ordering::Acquire) {\n                return Err(QueueError::PublishError(\"Queue is full\".to_string()));\n            }\n\n            // Try to claim the slot\n            match self.tail.compare_exchange_weak(\n                current_tail,\n                next_tail,\n                Ordering::Release,\n                Ordering::Relaxed,\n            ) {\n                Ok(_) =\u003e {\n                    // Successfully claimed the slot, now write the data\n                    let index = current_tail \u0026 self.mask;\n                    if let Ok(mut guard) = self.buffer[index].write() {\n                        *guard = Some(queue_data);\n                    }\n\n                    // Update stats\n                    // Note: In a truly ring-buffer implementation, we might want to use atomic counters\n                    // For now, we'll just increment the stats without locks\n                    // self.stats.total_published += 1;\n                    // self.stats.last_updated = timestamp;\n\n                    return Ok(());\n                }\n                Err(actual_tail) =\u003e {\n                    // Tail was updated by another producer, try again\n                    current_tail = actual_tail;\n                }\n            }\n        }\n    }\n\n    /// Get the most recent data from the queue\n    fn get_latest(\u0026self) -\u003e Option\u003c(Timestamp, Self::Data)\u003e {\n        let head = self.head.load(Ordering::Acquire);\n        let tail = self.tail.load(Ordering::Acquire);\n\n        // Check if queue is empty\n        if head == tail {\n            return None;\n        }\n\n        // Get the last item (just before tail)\n        let index = (tail - 1) \u0026 self.mask;\n        if let Ok(guard) = self.buffer[index].read() {\n            guard.clone()\n        } else {\n            None\n        }\n    }\n\n    /// Get the N most recent data items from the queue\n    fn get_latest_n(\u0026self, n: usize) -\u003e Vec\u003cSelf::Data\u003e {\n        let head = self.head.load(Ordering::Acquire);\n        let tail = self.tail.load(Ordering::Acquire);\n\n        // Check if queue is empty\n        if head == tail {\n            return Vec::new();\n        }\n\n        let size = tail.wrapping_sub(head) \u0026 self.mask;\n        let count = std::cmp::min(n, size);\n\n        let mut result = Vec::with_capacity(count);\n\n        // Collect the most recent items\n        for i in 0..count {\n            let index = (tail.wrapping_sub(i + 1)) \u0026 self.mask;\n            if let Ok(guard) = self.buffer[index].read() {\n                if let Some((_, data)) = \u0026*guard {\n                    result.push(data.clone());\n                }\n            }\n        }\n\n        result\n    }\n\n    /// Get the current number of items in the queue\n    fn get_size(\u0026self) -\u003e usize {\n        self.get_size_internal()\n    }\n\n    /// Start autonomous server\n    fn start_server(self) -\u003e Result\u003cQueueServerHandle, QueueError\u003e {\n        // For ring-buffer implementation, we don't need a server\n        // but we need to maintain API compatibility\n        use tokio::sync::oneshot;\n        let (shutdown_tx, shutdown_rx) = oneshot::channel();\n\n        let join_handle = tokio::spawn(async move {\n            // The ring-buffer queue doesn't need a background task\n            // but we wait for shutdown signal for API compatibility\n            let _ = shutdown_rx.await;\n        });\n\n        Ok(QueueServerHandle::new(shutdown_tx, join_handle))\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_lockfree_queue_creation() {\n        let queue: ShardedRingBuffer\u003ci32, 8\u003e = ShardedRingBuffer::new();\n        assert_eq!(queue.get_size(), 0);\n        assert_eq!(queue.capacity(), 8);\n        assert!(queue.is_empty());\n        assert!(!queue.is_full());\n    }\n\n    #[test]\n    fn test_queue_publish_and_retrieve() {\n        let mut queue: ShardedRingBuffer\u003cString, 8\u003e = ShardedRingBuffer::new();\n\n        queue.publish(\"test1\".to_string()).unwrap();\n        queue.publish(\"test2\".to_string()).unwrap();\n\n        assert_eq!(queue.get_size(), 2);\n        assert!(!queue.is_empty());\n\n        let latest = queue.get_latest();\n        assert!(latest.is_some());\n        assert_eq!(latest.unwrap().1, \"test2\");\n\n        let recent = queue.get_latest_n(2);\n        assert_eq!(recent.len(), 2);\n        assert_eq!(recent[0], \"test2\");\n        assert_eq!(recent[1], \"test1\");\n    }\n\n    #[test]\n    fn test_queue_full_behavior() {\n        let mut queue: ShardedRingBuffer\u003ci32, 4\u003e = ShardedRingBuffer::new();\n\n        // Fill the queue\n        for i in 0..3 {\n            queue.publish(i).unwrap();\n        }\n\n        // Queue should be full now (capacity-1 due to ring buffer design)\n        assert!(queue.is_full());\n        assert_eq!(queue.get_size(), 3);\n\n        // Try to publish one more item - should fail\n        let result = queue.publish(4);\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_queue_wraparound() {\n        let mut queue: ShardedRingBuffer\u003ci32, 8\u003e = ShardedRingBuffer::new();\n\n        // Fill the queue (capacity is 7 due to ring buffer design)\n        for i in 0..7 {\n            queue.publish(i).unwrap();\n        }\n\n        // Check that the queue is full\n        assert!(queue.is_full());\n\n        // Get the latest item (this doesn't remove it from the queue in our implementation)\n        let latest = queue.get_latest();\n        assert_eq!(latest.unwrap().1, 6);\n\n        // The queue is still full, so publishing should fail\n        assert!(queue.publish(7).is_err());\n    }\n}\n","traces":[{"line":34,"address":[92525 ::time::{Duration, SystemTime, UNIX_EPOCH};\n\n/// Persistence configuration for a queue\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PersistenceConfig {\n    /// Directory to store log files\n    pub data_dir: PathBuf,\n    /// Max file size before rotation (bytes)\n    pub max_file_size: u64,\n    /// Flush interval (milliseconds)\n    pub flush_interval_ms: u64,\n    /// Whether to include timestamps\n    pub include_timestamp: bool,\n    /// Whether to compress old files\n    pub compress_old: bool,\n}\n\nimpl Default for PersistenceConfig {\n    fn default() -\u003e Self {\n        Self {\n            data_dir: PathBuf::from(\"data\"),\n            max_file_size: 100 * 1024 * 1024, // 100MB\n            flush_interval_ms: 1000,          // 1 second\n            include_timestamp: true,\n            compress_old: false,\n        }\n    }\n}\n\n/// Persistence handle for a single queue\npub struct QueuePersistence {\n    sender: mpsc::Sender\u003cPersistEvent\u003e,\n    handle: Option\u003cJoinHandle\u003c()\u003e\u003e, // Store thread handle for graceful shutdown\n}\n\n/// Events sent to persistence thread\nenum PersistEvent {\n    Data { timestamp: u64, value: f64 },\n    Flush,\n    Shutdown,\n}\n\nimpl QueuePersistence {\n    /// Create new persistence handle for a queue\n    pub fn new(queue_name: \u0026str, config: PersistenceConfig) -\u003e std::io::Result\u003cSelf\u003e {\n        // Create data directory if needed\n        std::fs::create_dir_all(\u0026config.data_dir)?;\n\n        let log_file = config.data_dir.join(format!(\"{}.log\", queue_name));\n        let (sender, receiver) = mpsc::channel();\n        let config_clone = config.clone();\n\n        // Spawn background persistence thread\n        let handle = thread::spawn(move || {\n            persistence_thread(log_file, receiver, config_clone);\n        });\n\n        Ok(Self {\n            sender,\n            handle: Some(handle),\n        })\n    }\n\n    /// Persist a data point (non-blocking, may lag)\n    pub fn persist(\u0026self, value: f64) {\n        let timestamp = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap()\n            .as_millis() as u64;\n\n        // Send to background thread - don't block on failure\n        let _ = self.sender.send(PersistEvent::Data { timestamp, value });\n    }\n\n    /// Request flush (best effort)\n    pub fn flush(\u0026self) {\n        let _ = self.sender.send(PersistEvent::Flush);\n    }\n\n    /// Graceful shutdown with flush - call this before dropping\n    pub fn shutdown(\u0026mut self) {\n        // Send shutdown signal\n        let _ = self.sender.send(PersistEvent::Shutdown);\n\n        // Wait for thread to finish (with timeout)\n        if let Some(handle) = self.handle.take() {\n            let _ = handle.join(); // Wait for flush to complete\n        }\n    }\n}\n\nimpl Drop for QueuePersistence {\n    fn drop(\u0026mut self) {\n        // If not already shut down gracefully, do best effort\n        if self.handle.is_some() {\n            let _ = self.sender.send(PersistEvent::Shutdown);\n            if let Some(handle) = self.handle.take() {\n                let _ = handle.join();\n            }\n        }\n    }\n}\n\n/// Background persistence thread\nfn persistence_thread(\n    log_file: PathBuf,\n    receiver: mpsc::Receiver\u003cPersistEvent\u003e,\n    config: PersistenceConfig,\n) {\n    let file = OpenOptions::new()\n        .create(true)\n        .append(true)\n        .open(\u0026log_file)\n        .expect(\"Failed to open log file\");\n\n    let mut writer = BufWriter::with_capacity(64 * 1024, file); // 64KB buffer\n    let mut last_flush = std::time::Instant::now();\n    let flush_interval = Duration::from_millis(config.flush_interval_ms);\n\n    loop {\n        // Try to receive with timeout for periodic flush\n        match receiver.recv_timeout(Duration::from_millis(100)) {\n            Ok(event) =\u003e {\n                match event {\n                    PersistEvent::Data { timestamp, value } =\u003e {\n                        // Write in simple CSV-like format: timestamp,value\\n\n                        if config.include_timestamp {\n                            writeln!(\n                                writer,\n                                \"{},{}.{:03}\",\n                                timestamp,\n                                value as i64,\n                                ((value.fract() * 1000.0).abs()) as u64\n                            )\n                            .ok();\n                        } else {\n                            writeln!(writer, \"{}\", value).ok();\n                        }\n                    }\n                    PersistEvent::Flush =\u003e {\n                        let _ = writer.flush();\n                    }\n                    PersistEvent::Shutdown =\u003e {\n                        let _ = writer.flush();\n                        break;\n                    }\n                }\n            }\n            Err(mpsc::RecvTimeoutError::Timeout) =\u003e {\n                // Periodic flush check\n                if last_flush.elapsed() \u003e= flush_interval {\n                    let _ = writer.flush();\n                    last_flush = std::time::Instant::now();\n                }\n            }\n            Err(mpsc::RecvTimeoutError::Disconnected) =\u003e break,\n        }\n    }\n}\n\n/// Global persistence manager\npub struct PersistenceManager {\n    handles: Mutex\u003cHashMap\u003cString, Arc\u003cQueuePersistence\u003e\u003e\u003e,\n    default_config: PersistenceConfig,\n}\n\nimpl PersistenceManager {\n    pub fn new(default_config: PersistenceConfig) -\u003e Self {\n        Self {\n            handles: Mutex::new(HashMap::new()),\n            default_config,\n        }\n    }\n\n    pub fn enable_for_queue(\u0026self, queue_name: \u0026str) -\u003e std::io::Result\u003cArc\u003cQueuePersistence\u003e\u003e {\n        let mut handles = self.handles.lock().unwrap();\n\n        if let Some(handle) = handles.get(queue_name) {\n            return Ok(handle.clone());\n        }\n\n        let handle = Arc::new(QueuePersistence::new(\n            queue_name,\n            self.default_config.clone(),\n        )?);\n\n        handles.insert(queue_name.to_string(), handle.clone());\n        Ok(handle)\n    }\n\n    pub fn get_handle(\u0026self, queue_name: \u0026str) -\u003e Option\u003cArc\u003cQueuePersistence\u003e\u003e {\n        let handles = self.handles.lock().unwrap();\n        handles.get(queue_name).cloned()\n    }\n\n    /// Shutdown all persistence handles gracefully\n    pub fn shutdown_all(\u0026self) {\n        let mut handles = self.handles.lock().unwrap();\n        // Take ownership of all handles to trigger their shutdown via Drop\n        let handle_values: Vec\u003c_\u003e = handles.drain().map(|(_, handle)| handle).collect();\n\n        // Explicitly drop each handle to trigger the shutdown via Drop\n        for handle in handle_values {\n            drop(handle);\n        }\n    }\n}\n\n/// Helper function to convert values to f64 for persistence\npub fn convert_to_f64\u003cT\u003e(value: \u0026T) -\u003e Option\u003cf64\u003e\nwhere\n    T: 'static,\n{\n    // Try direct casting for numeric types\n    if let Some(v) = (value as \u0026dyn std::any::Any).downcast_ref::\u003cf64\u003e() {\n        Some(*v)\n    } else if let Some(v) = (value as \u0026dyn std::any::Any).downcast_ref::\u003cf32\u003e() {\n        Some(*v as f64)\n    } else if let Some(v) = (value as \u0026dyn std::any::Any).downcast_ref::\u003ci64\u003e() {\n        Some(*v as f64)\n    } else if let Some(v) = (value as \u0026dyn std::any::Any).downcast_ref::\u003ci32\u003e() {\n        Some(*v as f64)\n    } else if let Some(v) = (value as \u0026dyn std::any::Any).downcast_ref::\u003cu64\u003e() {\n        Some(*v as f64)\n    } else if let Some(v) = (value as \u0026dyn std::any::Any).downcast_ref::\u003cu32\u003e() {\n        Some(*v as f64)\n    } else {\n        // For non-numeric types, we can't persist without a custom serialization\n        None\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_convert_to_f64() {\n        let f64_val = 42.5_f64;\n        assert_eq!(convert_to_f64(\u0026f64_val), Some(42.5));\n\n        let f32_val = 42.5_f32;\n        assert_eq!(convert_to_f64(\u0026f32_val), Some(42.5));\n\n        let i64_val = 42_i64;\n        assert_eq!(convert_to_f64(\u0026i64_val), Some(42.0));\n\n        let string_val = \"hello\";\n        assert_eq!(convert_to_f64(\u0026string_val), None);\n    }\n\n    #[test]\n    fn test_persistence_config_default() {\n        let config = PersistenceConfig::default();\n        assert_eq!(config.data_dir, PathBuf::from(\"data\"));\n        assert_eq!(config.max_file_size, 100 * 1024 * 1024);\n        assert_eq!(config.flush_interval_ms, 1000);\n        assert_eq!(config.include_timestamp, true);\n        assert_eq!(config.compress_old, false);\n    }\n}\n","traces":[{"line":32,"address":[9013920,9014145,9014139],"length":1,"stats":{"Line":1}},{"line":34,"address":[9111790],"length":1,"stats":{"Line":1}},{"line":35,"address":[9111976,9111812],"length":1,"stats":{"Line":1}},{"line":58,"address":[8765616,8766655,8766617],"length":1,"stats":{"Line":1}},{"line":60,"address":[9008086,9008008],"length":1,"stats":{"Line":2}},{"line":62,"address":[9008184],"length":1,"stats":{"Line":1}},{"line":63,"address":[8766043,8766108],"length":1,"stats":{"Line":2}},{"line":64,"address":[8766188],"length":1,"stats":{"Line":1}},{"line":67,"address":[8766236],"length":1,"stats":{"Line":2}},{"line":68,"address":[9612247],"length":1,"stats":{"Line":2}},{"line":71,"address":[9008806],"length":1,"stats":{"Line":1}},{"line":72,"address":[8766390],"length":1,"stats":{"Line":1}},{"line":73,"address":[8766406],"length":1,"stats":{"Line":1}},{"line":78,"address":[9009072],"length":1,"stats":{"Line":1}},{"line":79,"ad ().unwrap_or_default();\n        Self {\n            queues: DashMap::new(),\n            sources: DashMap::new(),\n            config,\n            persistence_manager: PersistenceManager::new(persistence_config),\n        }\n    }\n\n    /// Add a queue with its source to the registry\n    pub fn add_queue\u003cT: Clone + Send + Sync + 'static\u003e(\n        \u0026self,\n        name: \u0026str,\n        source: impl QueueSource\u003cT\u003e + 'static,\n    ) -\u003e Result\u003c(), AutoQueuesError\u003e {\n        self.add_queue_with_interval_and_persistence(name, source, IntervalConfig::default(), false)\n    }\n\n    /// Add a queue with its source to the registry and enable persistence\n    pub fn add_queue_with_persistence\u003cT: Clone + Send + Sync + 'static\u003e(\n        \u0026self,\n        name: \u0026str,\n        source: impl QueueSource\u003cT\u003e + 'static,\n    ) -\u003e Result\u003c(), AutoQueuesError\u003e {\n        self.add_queue_with_interval_and_persistence(name, source, IntervalConfig::default(), true)\n    }\n\n    /// Add a queue with its source to the registry with specific interval configuration\n    pub fn add_queue_with_interval\u003cT: Clone + Send + Sync + 'static\u003e(\n        \u0026self,\n        name: \u0026str,\n        source: impl QueueSource\u003cT\u003e + 'static,\n        interval: IntervalConfig,\n    ) -\u003e Result\u003c(), AutoQueuesError\u003e {\n        self.add_queue_with_interval_and_persistence(name, source, interval, false)\n    }\n\n    /// Add a queue with its source to the registry with specific interval configuration and optional persistence\n    pub fn add_queue_with_interval_and_persistence\u003cT: Clone + Send + Sync + 'static\u003e(\n        \u0026self,\n        name: \u0026str,\n        source: impl QueueSource\u003cT\u003e + 'static,\n        interval: IntervalConfig,\n        enable_persistence: bool,\n    ) -\u003e Result\u003c(), AutoQueuesError\u003e {\n        let queue: Arc\u003cRwLock\u003cSimpleQueue\u003cT\u003e\u003e\u003e = Arc::new(RwLock::new(SimpleQueue::new()));\n\n        // Get persistence handle if enabled\n        let persistence = if enable_persistence {\n            Some(\n                self.persistence_manager\n                    .enable_for_queue(name)\n                    .map_err(|e| {\n                        AutoQueuesError::SourceError(format!(\"Persistence error: {}\", e))\n                    })?,\n            )\n        } else {\n            None\n        };\n\n        // Start the source\n        source.start(queue.clone(), \u0026self.config, interval, persistence);\n\n        // Store the queue and source\n        self.queues.insert(name.to_string(), Box::new(queue));\n        self.sources.insert(name.to_string(), Box::new(source));\n\n        Ok(())\n    }\n\n    /// Add an expression-based queue to the registry\n    pub fn add_expression_queue(\n        \u0026self,\n        name: \u0026str,\n        expression: \u0026str,\n        source_queue: \u0026str,\n        trigger_on_push: bool,\n        trigger_interval_ms: Option\u003cu64\u003e,\n    ) -\u003e Result\u003c(), AutoQueuesError\u003e {\n        self.add_expression_queue_with_persistence(\n            name,\n            expression,\n            source_queue,\n            trigger_on_push,\n            trigger_interval_ms,\n            false,\n        )\n    }\n\n    /// Add an expression-based queue to the registry with optional persistence\n    pub fn add_expression_queue_with_persistence(\n        \u0026self,\n        name: \u0026str,\n        expression: \u0026str,\n        source_queue: \u0026str,\n        trigger_on_push: bool,\n        trigger_interval_ms: Option\u003cu64\u003e,\n        enable_persistence: bool,\n    ) -\u003e Result\u003c(), AutoQueuesError\u003e {\n        // Validate the expression\n        compile_expression(expression).map_err(|e| {\n            AutoQueuesError::ExpressionError(format!(\"Invalid expression: {:?}\", e))\n        })?;\n\n        let source = ExpressionSource::new(\n            expression.to_string(),\n            source_queue.to_string(),\n            trigger_on_push,\n            trigger_interval_ms,\n        );\n\n        // Expressions always evaluate to f64 values\n        self.add_queue_with_interval_and_persistence::\u003cf64\u003e(\n            name,\n            source,\n            IntervalConfig::default(),\n            enable_persistence,\n        )\n    }\n\n    /// Get a queue from the registry\n    pub fn get_queue\u003cT: Clone + Send + Sync + 'static\u003e(\n        \u0026self,\n        name: \u0026str,\n    ) -\u003e Result\u003cArc\u003cRwLock\u003cSimpleQueue\u003cT\u003e\u003e\u003e, AutoQueuesError\u003e {\n        if let Some(queue) = self.queues.get(name) {\n            if let Some(typed_queue) = queue.as_any().downcast_ref::\u003cArc\u003cRwLock\u003cSimpleQueue\u003cT\u003e\u003e\u003e\u003e()\n            {\n                Ok(typed_queue.clone())\n            } else {\n                Err(AutoQueuesError::QueueError(QueueError::Other(\n                    \"Queue type mismatch\".to_string(),\n                )))\n            }\n        } else {\n            Err(AutoQueuesError::QueueError(QueueError::Other(\n                \"Queue not found\".to_string(),\n            )))\n        }\n    }\n\n    /// Start all queues\n    pub fn start(\u0026self) {\n        // In a real implementation, this would start all queue sources\n        // For now, we'll just iterate through the queues\n        for queue in self.queues.iter() {\n            println!(\"Starting queue: {}\", queue.key());\n        }\n    }\n\n    /// Pause a queue\n    pub fn pause(\u0026self, name: \u0026str) {\n        if let Some(_source) = self.sources.get(name) {\n            // In a real implementation, we would call source.pause()\n            println!(\"Pausing queue: {}\", name);\n        }\n    }\n\n    /// Resume a queue\n    pub fn resume(\u0026self, name: \u0026str) {\n        if let Some(_source) = self.sources.get(name) {\n            // In a real implementation, we would call source.resume()\n            println!(\"Resuming queue: {}\", name);\n        }\n    }\n\n    /// Remove a queue\n    pub fn remove(\u0026self, name: \u0026str) {\n        self.queues.remove(name);\n        self.sources.remove(name);\n        println!(\"Removed queue: {}\", name);\n    }\n\n    /// Enable persistence for a queue\n    pub fn enable_persistence(\u0026self, queue_name: \u0026str) -\u003e Result\u003c(), AutoQueuesError\u003e {\n        self.persistence_manager\n            .enable_for_queue(queue_name)\n            .map_err(|e| AutoQueuesError::SourceError(format!(\"Persistence error: {}\", e)))?;\n        Ok(())\n    }\n\n    /// Get persistence handle for a queue\n    pub fn get_persistence_handle(\u0026self, queue_name: \u0026str) -\u003e Option\u003cArc\u003cQueuePersistence\u003e\u003e {\n        self.persistence_manager.get_handle(queue_name)\n    }\n\n    /// Shutdown all persistence handles gracefully\n    pub fn shutdown_all_persistence(\u0026self) {\n        self.persistence_manager.shutdown_all();\n    }\n}\n","traces":[{"line":23,"address":[8247472],"length":1,"stats":{"Line":0}},{"line":24,"address":[],"length":0,"stats":{"Line":0}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":28,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[7718000,7718505,7718544],"length":1,"stats":{"Line":0}},{"line":43,"address":[7718109,7718022],"length":1,"stats":{"Line":0}},{"line":45,"address":[7718132],"length":1,"stats":{"Line":0}},{"line":46,"address":[7718185],"length":1,"stats":{"Line":0}},{"line":48,"address":[7718264],"length":1,"stats":{"Line":0}},{"line":53,"address":[9007680,9007948,9007919],"length":1,"stats":{"Line":0}},{"line":58,"address":[8959244,8959061],"length":1,"stats":{"Line":0}},{"line":67,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[7779 ` pattern.\n//!\n//! # Architecture\n//!\n//! ```text\n//! ┌─────────────────────────────────────────────────────────────────────────┐\n//! │                         SPMC Lock-Free Queue                            │\n//! ├─────────────────────────────────────────────────────────────────────────┤\n//! │                                                                         │\n//! │  Producer (single)                                                      │\n//! │  ┌─────────────┐     ┌──────────────────────────────────────────────┐  │\n//! │  │ push(data)  │────▶│  CircularBuffer (pre-allocated, N slots)    │  │\n//! │  │             │     │  tail: AtomicUsize (producer writes)         │  │\n//! │  └─────────────┘     └──────────────────────────────────────────────┘  │\n//! │                                                                         │\n//! │  Consumers (multiple, each with own head)                               │\n//! │  ┌─────────────┐     ┌──────────────────────────────────────────────┐    │\n//! │  │ consumer.   │     │  Each consumer has independent head position │    │\n//! │  │ pop()       │◀────│  head: AtomicUsize (consumer reads)          │    │\n//! │  └─────────────┘     │  No coordination between consumers           │    │\n//! │                      └──────────────────────────────────────────────┘    │\n//! │                                                                         │\n//! │  Key Properties:                                                        │\n//! │  - Single producer: atomic fetch_add for tail                           │\n//! │  - Multiple consumers: each has own atomic head                         │\n//! │  - Drop-oldest: circular buffer overwrites oldest                       │\n//! │  - No locks: only atomic operations after creation                     │\n//! │                                                                         │\n//! └─────────────────────────────────────────────────────────────────────────┘\n//!\n//! # Performance\n//!\n//! | Operation    | Target | Notes                                         |\n//! |--------------|--------|-----------------------------------------------|\n//! | push()       | \u003c 5μs  | Single atomic fetch_add + memcpy             |\n//! | pop()        | \u003c 3μs  | Atomic load + memcpy                         |\n//! | Allocations  | Zero   | Pre-allocated at creation                    |\n//! | Cache misses | Minimal| Contiguous memory, predictable access        |\n\nuse crate::constants::memory;\nuse crate::queue::{QueueError, QueueServerHandle};\nuse crate::traits::queue::QueueTrait;\nuse crate::types::{QueueData, Timestamp};\nuse circular_buffer::CircularBuffer;\nuse std::marker::PhantomData;\nuse std::sync::atomic::{AtomicUsize, Ordering};\nuse std::time::{SystemTime, UNIX_EPOCH};\n\n/// SPMC (Single-Producer, Multiple-Consumer) Lock-Free Circular Queue\n///\n/// This queue is designed for the AutoQueues `atomic.*` pattern where:\n/// - Exactly ONE producer per queue (e.g., the node's metric collector)\n/// - Multiple consumers can read concurrently (subscribers, aggregators)\n/// - Pre-allocated circular buffer with natural drop-oldest semantics\n/// - Target: sub-10μs operations\n///\n/// # Type Parameters\n///\n/// - `T`: Data type stored (must be Clone + Send + Sync + 'static)\n/// - `N`: Buffer capacity (must be power of 2 for efficient bitmask wrapping)\n///\n/// # Drop-Oldest Semantics\n///\n/// When the buffer is full and the producer pushes new data:\n/// - The oldest entry is overwritten (circular buffer behavior)\n/// - Consumers may miss overwritten data if they haven't read it yet\n/// - This is the desired behavior for telemetry (latest data matters most)\npub struct SPMCLockFreeQueue\u003cT, const N: usize = { memory::MAX_QUEUE_DEPTH }\u003e\nwhere\n    T: Clone + Send + Sync + 'static,\n{\n    /// Internal buffer using circular-buffer crate\n    /// Pre-allocated, contiguous memory, zero heap allocation after creation\n    buffer: CircularBuffer\u003cN, QueueData\u003cT\u003e\u003e,\n    /// Current tail position (producer writes here)\n    /// Only modified by producer thread using atomic operations\n    tail: AtomicUsize,\n    /// Bitmask for efficient wrap-around (N - 1, since N is power of 2)\n    /// Computed once at creation for performance\n    mask: usize,\n}\n\nimpl\u003cT, const N: usize\u003e SPMCLockFreeQueue\u003cT, N\u003e\nwhere\n    T: Clone + Send + Sync + 'static,\n{\n    /// Create a new SPMC lock-free queue\n    ///\n    /// # Panics\n    ///\n    /// Panics if N is not a power of 2. This is required for efficient\n    /// bitmask wrapping instead of modulo operations.\n    #[inline]\n    pub fn new() -\u003e Self {\n        Self::with_capacity(N)\n    }\n\n    /// Create a queue with specific capacity\n    #[inline]\n    pub fn with_capacity(_capacity: usize) -\u003e Self {\n        debug_assert!(\n            N.is_power_of_two(),\n            \"SPMCLockFreeQueue capacity must be a power of 2\"\n        );\n\n        Self {\n            buffer: CircularBuffer::new(),\n            tail: AtomicUsize::new(0),\n            mask: N.wrapping_sub(1),\n        }\n    }\n\n    /// Get the queue capacity\n    #[inline]\n    pub fn capacity(\u0026self) -\u003e usize {\n        N\n    }\n\n    /// Check if the queue is empty (from producer's view)\n    #[inline]\n    pub fn is_empty(\u0026self) -\u003e bool {\n        self.buffer.len() == 0\n    }\n\n    /// Check if the queue is full\n    #[inline]\n    pub fn is_full(\u0026self) -\u003e bool {\n        self.buffer.len() == N\n    }\n\n    /// Get current queue length (from producer's view)\n    #[inline]\n    pub fn len(\u0026self) -\u003e usize {\n        self.buffer.len()\n    }\n\n    /// Check how many items have been dropped\n    #[inline]\n    pub fn dropped_count(\u0026self) -\u003e usize {\n        // For circular buffer, dropped count would be total pushes - capacity\n        let tail = self.tail.load(Ordering::Acquire);\n        if tail \u003e N { tail - N } else { 0 }\n    }\n\n    /// Create a new consumer for this queue\n    ///\n    /// Each consumer tracks its own read position independently.\n    pub fn consumer(\u0026self) -\u003e SPMCConsumer\u003c'_, T, N\u003e {\n        SPMCConsumer::new(\u0026self.tail, \u0026self.buffer, self.mask)\n    }\n}\n\n// Verify N is power of 2 at compile time\nconst _: () = assert!(memory::MAX_QUEUE_DEPTH.is_power_of_two());\n\nimpl\u003cT, const N: usize\u003e Default for SPMCLockFreeQueue\u003cT, N\u003e\nwhere\n    T: Clone + Send + Sync + 'static,\n{\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl\u003cT, const N: usize\u003e SPMCLockFreeQueue\u003cT, N\u003e\nwhere\n    T: Clone + Send + Sync + 'static,\n{\n    /// Push data to the queue (PRODUCER operation)\n    ///\n    /// This is the ONE producer operation. Must be called from exactly\n    /// one thread (the metric collector).\n    ///\n    /// On overflow (full queue): Drops the oldest entry and pushes new data.\n    #[inline]\n    pub fn push(\u0026mut self, data: T) -\u003e Result\u003cbool, QueueError\u003e {\n        let timestamp = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap_or_default()\n            .as_millis() as Timestamp;\n\n        // Push to circular buffer (handles drop-oldest)\n        self.buffer.push_back((timestamp, data));\n\n        // Update atomic tail counter so consumers see the new item\n        // This is safe because there's only one producer (metric collector)\n        let _ = self.tail.fetch_add(1, Ordering::Release);\n\n        Ok(true)\n    }\n}\n\nimpl\u003cT, const N: usize\u003e QueueTrait for SPMCLockFreeQueue\u003cT, N\u003e\nwhere\n    T: Clone + Send + Sync + 'static,\n{\n    type Data = T;\n\n    #[inline]\n    fn get_size(\u0026self) -\u003e usize {\n        self.len()\n    }\n\n    fn publish(\u0026mut self, data: Self::Data) -\u003e Result\u003c(), QueueError\u003e {\n        self.push(data).map(|_| ())\n    }\n\n    fn get_latest(\u0026self) -\u003e Option\u003c(Timestamp, Self::Data)\u003e {\n        let consumer = self.consumer();\n        consumer.pop()\n    }\n\n    fn get_latest_n(\u0026self, _n: usize) -\u003e Vec\u003cSelf::Data\u003e {\n        let consumer = self.consumer();\n        consumer.drain().into_iter().map(|(_, v)| v).collect()\n    }\n\n    fn start_server(self) -\u003e Result\u003cQueueServerHandle, QueueError\u003e {\n        use tokio::sync::oneshot;\n        let (shutdown_tx, shutdown_rx) = oneshot::channel();\n\n        let join_handle = tokio::spawn(async move {\n            let _ = shutdown_rx.await;\n        });\n\n        Ok(QueueServerHandle::new(shutdown_tx, join_handle))\n    }\n}\n\n/// SPMCConsumer - Consumer handle for SPMC Lock-Free Queue\n///\n/// Each consumer tracks its own read position independently.\n/// Multiple consumers can read from the same queue without coordination.\npub struct SPMCConsumer\u003c'queue, T, const N: usize\u003e\nwhere\n    T: Clone + Send + Sync + 'static,\n{\n    /// Reference to the shared queue's tail\n    tail: \u0026'queue AtomicUsize,\n    /// Reference to the shared buffer\n    buffer: \u0026'queue CircularBuffer\u003cN, QueueData\u003cT\u003e\u003e,\n    /// This consumer's read head position\n    head: AtomicUsize,\n    /// Bitmask for efficient wrap-around\n    mask: usize,\n    /// Lifetime marker\n    _marker: PhantomData\u003c\u0026'queue ()\u003e,\n}\n\nunsafe impl\u003c'queue, T, const N: usize\u003e Send for SPMCConsumer\u003c'queue, T, N\u003e where T: Clone + Send + Sync + 'static {}\n\nunsafe impl\u003c'queue, T, const N: usize\u003e Sync for SPMCConsumer\u003c'queue, T, N\u003e where T: Clone + Send + Sync + 'static {}\n\nimpl\u003c'queue, T, const N: usize\u003e SPMCConsumer\u003c'queue, T, N\u003e\nwhere\n    T: Clone + Send + Sync + 'static,\n{\n    /// Create a consumer from a parent queue\n    pub(crate) fn new(\n        tail: \u0026'queue AtomicUsize,\n        buffer: \u0026'queue CircularBuffer\u003cN, QueueData\u003cT\u003e\u003e,\n        mask: usize,\n    ) -\u003e Self {\n        Self {\n            tail,\n            buffer,\n            head: AtomicUsize::new(0),\n            mask,\n            _marker: PhantomData,\n        }\n    }\n\n    /// Get the consumer's current head position\n    #[inline]\n    pub fn head_position(\u0026self) -\u003e usize {\n        self.head.load(Ordering::Acquire)\n    }\n\n    /// Check if this consumer has more data available\n    #[inline]\n    pub fn has_data(\u0026self) -\u003e bool {\n        !self.is_empty()\n    }\n\n    /// Check if queue is empty for this consumer\n    #[inline]\n    pub fn is_empty(\u0026self) -\u003e bool {\n        let tail = self.tail.load(Ordering::Acquire);\n        let head = self.head.load(Ordering::Acquire);\n        head \u003e= tail\n    }\n\n    /// Get number of items available for this consumer\n    #[inline]\n    pub fn available(\u0026self) -\u003e usize {\n        let tail = self.tail.load(Ordering::Acquire);\n        let head = self.head.load(Ordering::Acquire);\n        tail.saturating_sub(head).min(N)\n    }\n\n    /// Peek at the next value without consuming it\n    #[inline]\n    pub fn peek(\u0026self) -\u003e Option\u003c(Timestamp, T)\u003e {\n        self.pop_inner(false)\n    }\n\n    /// Pop data from the queue\n    ///\n    /// Returns the oldest unread item, or None if no new data.\n    #[inline]\n    pub fn pop(\u0026self) -\u003e Option\u003c(Timestamp, T)\u003e {\n        self.pop_inner(true)\n    }\n\n    /// Internal pop implementation\n    #[inline]\n    fn pop_inner(\u0026self, consume: bool) -\u003e Option\u003c(Timestamp, T)\u003e {\n        let tail = self.tail.load(Ordering::Acquire);\n        let head = self.head.load(Ordering::Acquire);\n\n        if head \u003e= tail {\n            return None;\n        }\n\n        let buffer_index = head \u0026 self.mask;\n        let slot = \u0026self.buffer[buffer_index];\n\n        let result = match slot {\n            (ts, data) if *ts != 0 =\u003e Some((*ts, data.clone())),\n            _ =\u003e None,\n        };\n\n        if consume \u0026\u0026 result.is_some() {\n            self.head.fetch_add(1, Ordering::AcqRel);\n        }\n\n        result\n    }\n\n    /// Pop multiple items at once\n    #[inline]\n    pub fn pop_batch(\u0026self, max_count: usize) -\u003e Vec\u003c(Timestamp, T)\u003e {\n        let tail = self.tail.load(Ordering::Acquire);\n        let head = self.head.load(Ordering::Acquire);\n\n        let available = tail.saturating_sub(head).min(N);\n        let count = std::cmp::min(available, max_count);\n\n        if count == 0 {\n            return Vec::with_capacity(0);\n        }\n\n        let mut result = Vec::with_capacity(count);\n\n        for i in 0..count {\n            let buffer_index = (head + i) \u0026 self.mask;\n            let slot = \u0026self.buffer[buffer_index];\n            if slot.0 != 0 {\n                result.push((slot.0, slot.1.clone()));\n            }\n        }\n\n        if !result.is_empty() {\n            self.head.fetch_add(result.len(), Ordering::AcqRel);\n        }\n\n        result\n    }\n\n    /// Drain all available data\n    #[inline]\n    pub fn drain(\u0026self) -\u003e Vec\u003c(Timestamp, T)\u003e {\n        self.pop_batch(usize::MAX)\n    }\n}\n\nimpl\u003c'queue, T, const N: usize\u003e Clone for SPMCConsumer\u003c'queue, T, N\u003e\nwhere\n    T: Clone + Send + Sync + 'static,\n{\n    fn clone(\u0026self) -\u003e Self {\n        Self {\n            tail: self.tail,\n            buffer: self.buffer,\n            head: AtomicUsize::new(self.head.load(Ordering::Acquire)),\n            mask: self.mask,\n            _marker: PhantomData,\n        }\n    }\n}\n\nimpl\u003c'queue, T: Clone + Send + Sync, const N: usize\u003e Drop for SPMCConsumer\u003c'queue, T, N\u003e {\n    fn drop(\u0026mut self) {\n        // Nothing to clean up - references handled by lifetime\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    const CAP: usize = 16;\n\n    #[test]\n    fn test_spmc_creation() {\n        let queue: SPMCLockFreeQueue\u003ci32, CAP\u003e = SPMCLockFreeQueue::new();\n        assert!(queue.is_empty());\n        assert_eq!(queue.capacity(), CAP);\n    }\n\n    #[test]\n    fn test_spmc_basic_push_pop() {\n        let mut queue: SPMCLockFreeQueue\u003ci32, CAP\u003e = SPMCLockFreeQueue::new();\n\n        queue.push(42).unwrap();\n        queue.push(84).unwrap();\n\n        assert_eq!(queue.len(), 2);\n    }\n\n    #[test]\n    fn test_spmc_single_consumer() {\n        let mut queue: SPMCLockFreeQueue\u003cString, CAP\u003e = SPMCLockFreeQueue::new();\n\n        queue.push(\"hello\".to_string()).unwrap();\n        queue.push(\"world\".to_string()).unwrap();\n\n        let consumer = queue.consumer();\n\n        let first = consumer.pop();\n        assert_eq!(first.unwrap().1, \"hello\");\n\n        let second = consumer.pop();\n        assert_eq!(second.unwrap().1, \"world\");\n\n        assert!(consumer.pop().is_none());\n    }\n\n    #[test]\n    fn test_spmc_multiple_consumers() {\n        let mut queue: SPMCLockFreeQueue\u003cf64, CAP\u003e = SPMCLockFreeQueue::new();\n\n        for i in 0..10 {\n            queue.push(i as f64).unwrap();\n        }\n\n        let c1 = queue.consumer();\n        let c2 = queue.consumer();\n        let c3 = queue.consumer();\n\n        let mut count1 = 0;\n        while c1.pop().is_some() {\n            count1 += 1;\n        }\n\n        let mut count2 = 0;\n        while c2.pop().is_some() {\n            count2 += 1;\n        }\n\n        let mut count3 = 0;\n        while c3.pop().is_some() {\n            count3 += 1;\n        }\n\n        assert_eq!(count1, 10);\n        assert_eq!(count2, 10);\n        assert_eq!(count3, 10);\n    }\n\n    #[test]\n    fn test_spmc_drop_oldest() {\n        let mut queue: SPMCLockFreeQueue\u003ci32, 8\u003e = SPMCLockFreeQueue::new();\n\n        for i in 0..8 {\n            queue.push(i).unwrap();\n        }\n\n        assert!(queue.is_full());\n\n        // Push more - should drop oldest (0)\n        queue.push(100).unwrap();\n\n        let consumer = queue.consumer();\n        let items: Vec\u003ci32\u003e = consumer.drain().into_iter().map(|(_, v)| v).collect();\n\n        assert_eq!(items.len(), 8);\n        assert_eq!(items[0], 1); // First item after drop\n        assert_eq!(items[7], 100); // Most recent\n    }\n\n    #[test]\n    fn test_spmc_consumer_clone() {\n        let mut queue: SPMCLockFreeQueue\u003ci32, CAP\u003e = SPMCLockFreeQueue::new();\n        queue.push(1).unwrap();\n        queue.push(2).unwrap();\n\n        let c1 = queue.consumer();\n        let c2 = c1.clone();\n\n        assert_eq!(c1.head_position(), 0);\n        assert_eq!(c2.head_position(), 0);\n\n        c1.pop();\n\n        assert_eq!(c1.head_position(), 1);\n        assert_eq!(c2.head_position(), 0);\n    }\n\n    #[test]\n    fn test_spmc_batch_and_drain() {\n        let mut queue: SPMCLockFreeQueue\u003ci32, CAP\u003e = SPMCLockFreeQueue::new();\n\n        for i in 0..100 {\n            queue.push(i).unwrap();\n        }\n\n        let consumer = queue.consumer();\n\n        let batch = consumer.pop_batch(10);\n        assert_eq!(batch.len(), 10);\n\n        let more = consumer.pop_batch(10);\n        assert_eq!(more.len(), 10);\n\n        assert_eq!(consumer.head_position(), 20);\n    }\n}\n","traces":[{"line":97,"address":[8983936],"length":1,"stats":{"Line":8}},{"line":98,"address":[],"length":0,"stats":{"Line":8}},{"line":103,"address":[],"length":0,"stats":{"Line":7}},{"line":104,"address":[],"length":0,"stats":{"Line":0}},{"line":105,"address":[],"length":0,"stats":{"Line":0}},{"line":106,"address":[],"length":0,"stats":{"Line":0}},{"line":110,"address":[8983719],"length":1,"stats":{"Line":8}},{"line":111,"address":[8983737,8983795],"length":1,"stats":{"Line":16}},{"line":112,"address":[8   NetworkUnreachable,\n\n    #[error(\"Transport shutdown\")]\n    TransportShutdown,\n\n    #[error(\"Serialization error: {source}\")]\n    SerializationError {\n        source: Box\u003cdyn std::error::Error + Send + Sync\u003e,\n    },\n\n    #[error(\"Timeout after {duration:?}\")]\n    Timeout { duration: std::time::Duration },\n}\n\n/// Connection information\n#[derive(Debug, Clone)]\npub struct ConnectionInfo {\n    pub remote_addr: String,\n    pub transport_type: TransportType,\n    pub connected_at: std::time::Instant,\n}\n\n/// Transport types\n#[derive(Debug, Clone, PartialEq)]\npub enum TransportType {\n    ZeroMQ,\n    QUIC,\n    TCP,\n}\n\n/// Ultra-minimal async transport trait for maximum flexibility\n#[async_trait]\npub trait Transport: Send + Sync + std::fmt::Debug {\n    /// Connect to remote address\n    async fn connect(\u0026self, addr: \u0026str) -\u003e Result\u003cConnectionInfo, TransportError\u003e;\n\n    /// Send data to remote endpoint\n    async fn send(\u0026self, data: \u0026[u8]) -\u003e Result\u003c(), TransportError\u003e;\n\n    /// Receive data from remote endpoint\n    async fn receive(\u0026self) -\u003e Result\u003cVec\u003cu8\u003e, TransportError\u003e;\n\n    /// Check if connected\n    fn is_connected(\u0026self) -\u003e bool;\n\n    /// Get connection info\n    fn connection_info(\u0026self) -\u003e Option\u003cConnectionInfo\u003e;\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","neeraj","syncthing","Darkforce","Sync","Git_repos","autoqueues","src","types.rs"],"content":"//! Queue Types Module\n//!\n//! Core types for the queue system\n\nuse std::sync::atomic::{AtomicU64, Ordering};\n\n/// Timestamp type for queue data\npub type Timestamp = u64;\n\n/// Queue data point with timestamp - tuple format for simplicity\npub type QueueData\u003cT\u003e = (Timestamp, T);\n\n/// Queue identifier - u32 for performance\npub type QueueId = u32;\n\n/// Queue statistics for monitoring\n#[derive(Debug, Clone)]\npub struct QueueStats {\n    pub total_published: u64,\n    pub last_updated: Timestamp,\n}\n\nimpl QueueStats {\n    pub fn new() -\u003e Self {\n        Self {\n            total_published: 0,\n            last_updated: 0,\n        }\n    }\n}\n\n/// Atomic queue statistics - lock-free alternative to QueueStats\n///\n/// Uses AtomicU64 for both fields, eliminating mutex contention\n/// on every publish operation.\n#[derive(Debug)]\npub struct AtomicQueueStats {\n    pub total_published: AtomicU64,\n    pub last_updated: AtomicU64,\n}\n\nimpl AtomicQueueStats {\n    /// Create new atomic stats with zero values\n    pub fn new() -\u003e Self {\n        Self {\n            total_published: AtomicU64::new(0),\n            last_updated: AtomicU64::new(0),\n        }\n    }\n\n    /// Increment the published counter (lock-free)\n    #[inline]\n    pub fn increment_published(\u0026self) {\n        self.total_published.fetch_add(1, Ordering::Relaxed);\n    }\n\n    /// Update the last updated timestamp (lock-free)\n    #[inline]\n    pub fn update_timestamp(\u0026self, timestamp: Timestamp) {\n        self.last_updated.store(timestamp, Ordering::Relaxed);\n    }\n\n    /// Get current statistics snapshot (for reporting)\n    #[inline]\n    pub fn snapshot(\u0026self) -\u003e QueueStats {\n        QueueStats {\n            total_published: self.total_published.load(Ordering::Acquire),\n            last_updated: self.last_updated.load(Ordering::Acquire),\n        }\n    }\n\n    /// Get total published count\n    #[inline]\n    pub fn total_published(\u0026self) -\u003e u64 {\n        self.total_published.load(Ordering::Acquire)\n    }\n\n    /// Get last updated timestamp\n    #[inline]\n    pub fn last_updated(\u0026self) -\u003e Timestamp {\n        self.last_updated.load(Ordering::Acquire)\n    }\n}\n\nimpl Default for AtomicQueueStats {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_atomic_queue_stats_creation() {\n        let stats = AtomicQueueStats::new();\n        assert_eq!(stats.total_published(), 0);\n        assert_eq!(stats.last_updated(), 0);\n    }\n\n    #[test]\n    fn test_atomic_queue_stats_increment() {\n        let stats = AtomicQueueStats::new();\n        stats.increment_published();\n        assert_eq!(stats.total_published(), 1);\n\n        stats.increment_published();\n        stats.increment_published();\n        assert_eq!(stats.total_published(), 3);\n    }\n\n    #[test]\n    fn test_atomic_queue_stats_timestamp() {\n        let stats = AtomicQueueStats::new();\n        stats.update_timestamp(12345);\n        assert_eq!(stats.last_updated(), 12345);\n    }\n\n    #[test]\n    fn test_atomic_queue_stats_snapshot() {\n        let stats = AtomicQueueStats::new();\n        stats.increment_published();\n        stats.increment_published();\n        stats.update_timestamp(54321);\n\n        let snapshot = stats.snapshot();\n        assert_eq!(snapshot.total_published, 2);\n        assert_eq!(snapshot.last_updated, 54321);\n    }\n}\n","traces":[{"line":24,"address":[9353488],"length":1,"stats":{"Line":0}},{"line":42,"address":[22664946,22665178,22664218,22665018,22666546,22665746,22664378,22666226,22664058,22666298,22665338,22665658,22665978,22665498,22664698,22665906,22664626,22666386,22665426,22664146,22664858,22664538,22665106,22663986,22666066,22666618,22665818,22664306,22664466,22664786,22665266,22666458,22665586,22666138],"length":1,"stats":{"Line":0}},{"line":44,"address":[9353632],"length":1,"stats":{"Line":1}},{"line":46,"address":[9298334],"length":1,"stats":{"Line":1}},{"line":47,"address":[9298358],"length":1,"stats":{"Line":1}},{"line":53,"address":[9298288],"length":1,"stats":{"Line":2}},{"line":54,"address":[],"length":0,"stats":{"Line":2}},{"line":59,"address":[24132761,24132597],"length":1,"stats":{"Line":1}},{"line":60,"address":[7672654],"length":1,"stats":{"Line":1}},{"line":65,"address":[24132872],"leng
