(\"function:cpu\").unwrap();\n        assert_eq!(func.variables(), vec![\"cpu\"]);\n\n        let expr = autoqueues::config::SourceType::parse(\"expression:cpu + memory\").unwrap();\n        let vars = expr.variables();\n        assert!(vars.contains(\u0026\"cpu\".to_string()));\n        assert!(vars.contains(\u0026\"memory\".to_string()));\n    }\n\n    #[test]\n    fn test_local_test_config() {\n        let config = ConfigGenerator::local_test(3, 7000);\n        assert_eq!(config.all_nodes().len(), 3);\n        assert!(config.my_node(1).is_ok());\n        assert!(config.my_node(4).is_err()); // Should not exist\n    }\n\n    #[test]\n    fn test_production_config() {\n        let nodes = vec![(\"node1\", \"192.168.1.10\"), (\"node2\", \"192.168.1.11\")];\n        let config = ConfigGenerator::production(\u0026nodes);\n        assert_eq!(config.all_nodes().len(), 2);\n        assert!(config.my_node(1).is_ok());\n        assert!(config.my_node(3).is_err()); // Should not exist\n    }\n\n    #[test]\n    fn test_config_builder() {\n        let config = Config::builder()\n            .add_node(\"node1\", \"127.0.0.1\", 7001, 7002, 7003, 7004)\n            .add_node(\"node2\", \"127.0.0.1\", 7101, 7102, 7103, 7104)\n            .add_node(\"node10\", \"127.0.0.1\", 8001, 8002, 8003, 8004) // This would have failed before\n            .add_local_metric(\"cpu\", \"function:cpu\")\n            .add_global_aggregation(\"cpu_avg\", \"avg\", \u0026[\"cpu\"], 1000)\n            .build();\n\n        assert_eq!(config.all_nodes().len(), 3); // Now we have 3 nodes\n        assert_eq!(config.local.len(), 1);\n        assert_eq!(config.global.len(), 1);\n        assert!(config.my_node(1).is_ok());\n        assert!(config.my_node(10).is_ok()); // Now this should work\n        assert!(config.my_node(3).is_err()); // Should not exist\n    }\n\n    #[test]\n    fn test_collect_nodes() {\n        let mut table = NodeTable::default();\n        table.nodes.insert(\n            \"node1\".to_string(),\n            NodeConfig {\n                host: \"127.0.0.1\".to_string(),\n                communication_port: 7001,\n                query_port: 7002,\n                coordination_port: 7003,\n                pubsub_port: 7004,\n            },\n        );\n        table.nodes.insert(\n            \"node2\".to_string(),\n            NodeConfig {\n                host: \"127.0.0.1\".to_string(),\n                communication_port: 7101,\n                query_port: 7102,\n                coordination_port: 7103,\n                pubsub_port: 7104,\n            },\n        );\n\n        let nodes = table.collect_nodes();\n        assert_eq!(nodes.len(), 2);\n        assert!(nodes.iter().any(|(name, _)| name == \"node1\"));\n        assert!(nodes.iter().any(|(name, _)| name == \"node2\"));\n    }\n\n    #[test]\n    fn test_toml_deserialization() {\n        let toml_str = r#\"\n            [node1]\n            host = \"127.0.0.1\"\n            communication_port = 7067\n            query_port = 7069\n            coordination_port = 7070\n            pubsub_port = 7071\n\n            [node2]\n            host = \"127.0.0.1\"\n            communication_port = 7167\n            query_port = 7169\n            coordination_port = 7170\n            pubsub_port = 7171\n\n            [local]\n            cpu = \"function:cpu\"\n            memory = \"function:memory\"\n\n            [global.cpu_avg]\n            aggregation = \"avg\"\n            sources = [\"cpu\"]\n            interval_ms = 1000\n        \"#;\n\n        let config: Config = toml::from_str(toml_str).unwrap();\n        assert_eq!(config.all_nodes().len(), 2);\n        assert_eq!(config.local.len(), 2);\n        assert_eq!(config.global.len(), 1);\n        assert!(config.my_node(1).is_ok());\n        assert!(config.my_node(2).is_ok());\n        assert!(config.my_node(3).is_err());\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","neeraj","syncthing","Darkforce","Sync","Git_repos","autoqueues","src","constants.rs"],"content":"//! AutoQueues Performance Constants\n//!\n//! This module consolidates all magic numbers to make performance tuning easier.\n//! Changes here affect the entire system - test thoroughly after modifications.\n\npub mod time {\n    //! Timing-related constants\n    //!\n    //! INCREASING these values:\n    //! - Increases latency in responsiveness\n    //! - Reduces CPU overhead from frequent operations\n    //! - May cause missed data points in fast-changing metrics\n    //!\n    //! DECREASING these values:\n    //! - Improves responsiveness to changes\n    //! - Increases CPU overhead and context switches\n    //! - May cause lock contention under load\n\n    /// Interval for metric collection in milliseconds\n    /// Default: 1000ms (1 second)\n    pub const METRICS_INTERVAL_MS: u64 = 1000;\n\n    /// Interval for health check in milliseconds\n    /// Default: 5000ms (5 seconds)\n    pub const HEALTH_CHECK_INTERVAL_MS: u64 = 5000;\n\n    /// Connection timeout in milliseconds\n    /// Default: 30000ms (30 seconds)\n    pub const CONNECTION_TIMEOUT_MS: u64 = 30_000;\n\n    /// Retry backoff base delay in milliseconds\n    /// Default: 100ms\n    ///\n    /// INCREASING: More resilient to network issues, slower recovery\n    /// DECREASING: Faster recovery, may overwhelm network under issues\n    pub const RETRY_BASE_DELAY_MS: u64 = 100;\n\n    /// Maximum retry attempts before giving up\n    /// Default: 3\n    ///\n    /// INCREASING: More resilient, longer failure cascades\n    /// DECREASING: Faster failure detection, less resilient\n    pub const MAX_RETRIES: usize = 3;\n\n    /// Exponential backoff multiplier\n    /// Default: 2 (doubles each retry)\n    ///\n    /// INCREASING: Slower recovery, more resilient to thundering herd\n    /// DECREASING: Faster recovery, may overwhelm network\n    pub const RETRY_BACKOFF_MULTIPLIER: u64 = 2;\n\n    /// Interval for aggregation in milliseconds\n    /// Default: 500ms\n    pub const AGGREGATION_INTERVAL_MS: u64 = 500;\n\n    /// Short sleep interval for polling operations\n    /// Default: 100ms\n    pub const SHORT_SLEEP_INTERVAL_MS: u64 = 100;\n\n    /// Very short sleep interval for fast polling\n    /// Default: 10ms\n    pub const VERY_SHORT_SLEEP_INTERVAL_MS: u64 = 10;\n\n    /// Election timeout in milliseconds\n    /// Default: 1000ms\n    pub const ELECTION_TIMEOUT_MS: u64 = 1000;\n\n    /// Tick interval for Raft consensus\n    /// Default: 100ms\n    pub const TICK_INTERVAL_MS: u64 = 100;\n\n    /// Query timeout in milliseconds\n    /// Default: 1000ms\n    pub const QUERY_TIMEOUT_MS: u64 = 1000;\n\n    /// Freshness timeout (2 × AIMD_max)\n    /// Default: 10000ms (10 seconds)\n    pub const FRESHNESS_TIMEOUT_MS: u64 = 10_000;\n\n    /// Check interval for leader checks\n    /// Default: 1000ms\n    pub const LEADER_CHECK_INTERVAL_MS: u64 = 1000;\n\n    /// Minimum interval for AIMD algorithm\n    /// Default: 100ms\n    pub const AIMD_MIN_INTERVAL_MS: u64 = 100;\n\n    /// Maximum interval for AIMD algorithm\n    /// Default: 5000ms\n    pub const AIMD_MAX_INTERVAL_MS: u64 = 5_000;\n}\n\npub mod memory {\n    //! Memory allocation constants\n    //!\n    //! INCREASING these values:\n    //! - Reduces reallocation overhead\n    //! - Increases baseline memory usage\n    //! - May waste memory for small workloads\n    //!\n    //! DECREASING these values:\n    //! - Saves memory for small workloads\n    //! - Increases reallocation frequency\n    //! - May cause allocation spikes under load\n\n    /// Default HashMap capacity for variable storage\n    /// Default: 8\n    pub const HASHMAP_DEFAULT_CAPACITY: usize = 8;\n\n    /// Default Vec capacity for queue buffers\n    /// Default: 32\n    pub const VEC_DEFAULT_CAPACITY: usize = 32;\n\n    /// Maximum queue depth before backpressure\n    /// Default: 1024\n    ///\n    /// INCREASING: More buffering, higher memory usage\n    /// DECREASING: Earlier backpressure, lower memory usage\n    pub const MAX_QUEUE_DEPTH: usize = 1024;\n\n    /// Channel buffer size for metrics\n    /// Default: 100\n    pub const METRICS_CHANNEL_BUFFER_SIZE: usize = 100;\n\n    /// Small channel buffer size\n    /// Default: 1\n    pub const SMALL_CHANNEL_BUFFER_SIZE: usize = 1;\n\n    /// History buffer size for entries\n    /// Default: 100\n    pub const HISTORY_BUFFER_SIZE: usize = 100;\n\n    /// Small history buffer size\n    /// Default: 10\n    pub const SMALL_HISTORY_BUFFER_SIZE: usize = 10;\n}\n\npub mod network {\n    //! Network-related constants\n    //!\n    //! INCREASING these values:\n    //! - Better handling of burst traffic\n    //! - Higher memory usage for buffers\n    //! - May mask network issues longer\n    //!\n    //! DECREASING these values:\n    //! - Lower memory footprint\n    //! - Earlier detection of network issues\n    //! - May drop bursts under load\n\n    /// ZMQ LINGER value for socket cleanup\n    /// Default: 0 (immediate close)\n    pub const ZMQ_LINGER: i32 = 0;\n\n    /// Maximum message size in bytes (1MB)\n    /// Default: 1_048_576\n    pub const MAX_MESSAGE_SIZE: usize = 1_048_576;\n\n    /// Heartbeat interval in milliseconds\n    /// Default: 1000ms\n    pub const HEARTBEAT_INTERVAL_MS: u64 = 1000;\n\n    /// Peer discovery timeout\n    /// Default: 5000ms\n    pub const PEER_DISCOVERY_TIMEOUT_MS: u64 = 5_000;\n\n    /// Node communication port for ZMQ PUB/SUB\n    /// Used for:\n    ///   - Publishing metrics to other nodes\n    ///   - Receiving metrics from other nodes\n    ///   - Cluster coordination messages\n    /// Default: 6967\n    pub const DEFAULT_NODE_COMMUNICATION_PORT: u16 = 6967;\n\n    /// Query port for REQ/REP communication\n    /// Used for:\n    ///   - External clients requesting current metric values\n    ///   - Dashboard/API queries\n    /// Default: 6969\n    pub const DEFAULT_QUERY_PORT: u16 = 6969;\n\n    /// Raft coordination port for leader election\n    /// Used for:\n    ///   - Raft consensus protocol\n    ///   - Meta-leader election\n    /// Default: 6970\n    pub const DEFAULT_COORDINATION_PORT: u16 = 6970;\n\n    /// Pub/Sub port for metric distribution\n    /// Used for:\n    ///   - Publishing local metrics to cluster\n    ///   - Subscribing to metrics from other nodes\n    ///   - Real-time metric broadcasting\n    /// Default: 6971\n    pub const DEFAULT_PUBSUB_PORT: u16 = 6971;\n\n    /// Receive timeout for ZMQ sockets\n    /// Default: 1000ms\n    pub const ZMQ_RCVTIMEO_MS: i32 = 1000;\n\n    /// Short receive timeout for ZMQ sockets\n    /// Default: 100ms\n    pub const ZMQ_SHORT_RCVTIMEO_MS: i32 = 100;\n}\n\npub mod expression {\n    //! Expression evaluation constants\n    //!\n    //! INCREASING these values:\n    //! - Allows more complex expressions\n    //! - May increase expression parsing time\n    //! - Higher memory usage for compiled expressions\n    //!\n    //! DECREASING these values:\n    //! - Prevents complex/malicious expressions\n    //! - Faster validation\n    //! - May reject valid complex expressions\n\n    /// Maximum expression length in characters\n    /// Default: 1000\n    pub const MAX_EXPRESSION_LENGTH: usize = 1000;\n\n    /// Maximum number of variables in expression\n    /// Default: 20\n    pub const MAX_EXPRESSION_VARS: usize = 20;\n\n    /// Expression evaluation timeout in milliseconds\n    /// Default: 100ms\n    pub const EXPRESSION_TIMEOUT_MS: u64 = 100;\n}\n\npub mod lock {\n    //! Lock and concurrency constants\n    //!\n    //! INCREASING these values:\n    //! - More tolerant of slow operations under lock\n    //! - May cause head-of-line blocking\n    //! - Higher latency under contention\n    //!\n    //! DECREASING these values:\n    //! - More responsive under contention\n    //! - May cause lock timeout errors\n    //! - Better for fast operations\n\n    /// Lock timeout for read operations\n    /// Default: 5000ms\n    pub const READ_LOCK_TIMEOUT_MS: u64 = 5_000;\n\n    /// Lock timeout for write operations\n    /// Default: 1000ms\n    pub const WRITE_LOCK_TIMEOUT_MS: u64 = 1_000;\n\n    /// Maximum pending lock waiters\n    /// Default: 16\n    pub const MAX_LOCK_WAITERS: usize = 16;\n}\n\npub mod system {\n    //! System-level constants\n\n    /// Maximum number of queues\n    /// Default: 100\n    pub const MAX_QUEUES: usize = 100;\n\n    /// Graceful shutdown timeout in milliseconds\n    /// Default: 5000ms\n    pub const SHUTDOWN_TIMEOUT_MS: u64 = 5_000;\n\n    /// Base port offset for additional publishers\n    /// Default: 100\n    pub const BASE_PORT_OFFSET: u16 = 100;\n\n    /// Consensus count for leader queries\n    /// Default: 3\n    pub const CONSENSUS_COUNT: usize = 3;\n}\n\npub mod config {\n    //! Configuration defaults\n    //!\n    //! These values can be overridden via config file\n\n    /// Default queue capacity\n    /// Default: 1024\n    pub const DEFAULT_CAPACITY: usize = 1024;\n\n    /// Default collection interval in milliseconds\n    /// Default: 1000ms\n    pub const DEFAULT_INTERVAL_MS: u64 = 1000;\n\n    /// Default number of shards for registry\n    /// Default: 16\n    pub const DEFAULT_REGISTRY_SHARDS: usize = 16;\n\n    /// Number of shards for sharded registry\n    /// Must be power of 2 for fast modulo\n    pub const REGISTRY_SHARD_COUNT: usize = 16;\n\n    /// Shard mask for sharded registry (REGISTRY_SHARD_COUNT - 1)\n    /// Used for fast modulo: index \u0026 SHARD_MASK\n    pub const REGISTRY_SHARD_MASK: usize = REGISTRY_SHARD_COUNT - 1;\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","neeraj","syncthing","Darkforce","Sync","Git_repos","autoqueues","src","dist","aggregator.rs"],"content":"//! Distributed aggregator for AutoQueues\n//!\n//! Provides aggregation operations across cluster nodes.\n\nuse crate::dist::node_client::NodeClient;\nuse crate::dist::sync::TimeSync;\nuse crate::cluster::RaftClusterNode;\nuse crate::cluster::types::EntryData;\nuse evalexpr::{ContextWithMutableVariables, HashMapContext, Value};\nuse std::collections::HashMap;\nuse std::net::SocketAddr;\nuse std::sync::Arc;\n\n/// Aggregation type for global metrics\n#[derive(Debug, Clone)]\npub enum AggregationType {\n    Avg,\n    Max,\n    Min,\n    Sum,\n    Percentile(f64),\n    Stddev,\n    Count(String),  // predicate like \"cpu \u003e 80\"\n    Expression {\n        expr: String,       // expression like \"(100 - cpu) + memory_free\"\n        agg: Box\u003cAggregationType\u003e,  // how to aggregate the computed scores\n    },\n}\n\nimpl AggregationType {\n    /// Parse aggregation string from config\n    pub fn from_str(s: \u0026str) -\u003e Result\u003cSelf, String\u003e {\n        match s {\n            \"avg\" =\u003e Ok(Self::Avg),\n            \"max\" =\u003e Ok(Self::Max),\n            \"min\" =\u003e Ok(Self::Min),\n            \"sum\" =\u003e Ok(Self::Sum),\n            \"stddev\" =\u003e Ok(Self::Stddev),\n            \"median\" =\u003e Ok(Self::Percentile(50.0)),\n            s if s.starts_with(\"p\") =\u003e {\n                let pct: f64 = s[1..].parse().map_err(|_| \"Invalid percentile\")?;\n                Ok(Self::Percentile(pct))\n            }\n            s if s.starts_with(\"count:\") =\u003e {\n                let predicate = s[6..].to_string();\n                Ok(Self::Count(predicate))\n            }\n            _ =\u003e Err(format!(\"Unknown aggregation type: {}\", s)),\n        }\n    }\n\n    /// Create an expression aggregation\n    pub fn expression(expr: \u0026str, agg: AggregationType) -\u003e Self {\n        Self::Expression {\n            expr: expr.to_string(),\n            agg: Box::new(agg),\n        }\n    }\n}\n\n/// Distributed aggregator for computing aggregations across cluster nodes\n#[derive(Clone)]\npub struct DistributedAggregator {\n    _node_id: String,\n    local_values: HashMap\u003cString, f64\u003e,\n    node_client: NodeClient,\n    _time_sync: TimeSync,\n    raft_node: Option\u003cArc\u003cRaftClusterNode\u003e\u003e,\n}\n\nimpl DistributedAggregator {\n    /// Create a new distributed aggregator\n    pub fn new(node_id: String, nodes: Vec\u003cSocketAddr\u003e) -\u003e Self {\n        let node_client = NodeClient::new(node_id.clone(), nodes);\n        let time_sync = TimeSync::new(node_id.clone());\n\n        Self {\n            _node_id: node_id,\n            local_values: HashMap::new(),\n            node_client,\n            _time_sync: time_sync,\n            raft_node: None,\n        }\n    }\n    \n    /// Create a new distributed aggregator with Raft cluster support\n    pub fn with_raft(node_id: String, nodes: Vec\u003cSocketAddr\u003e, raft_node: Arc\u003cRaftClusterNode\u003e) -\u003e Self {\n        let node_client = NodeClient::new(node_id.clone(), nodes);\n        let time_sync = TimeSync::new(node_id.clone());\n\n        Self {\n            _node_id: node_id,\n            local_values: HashMap::new(),\n            node_client,\n            _time_sync: time_sync,\n            raft_node: Some(raft_node),\n        }\n    }\n\n    /// Set a local value for a queue\n    pub fn set_local_value(\u0026mut self, queue_name: String, value: f64) {\n        self.local_values.insert(queue_name, value);\n    }\n\n    /// Get the global average across all nodes\n    pub async fn global_avg(\n        \u0026mut self,\n        queue_name: \u0026str,\n    ) -\u003e Result\u003cf64, Box\u003cdyn std::error::Error\u003e\u003e {\n        // Only leader can propose aggregations if Raft is enabled\n        if let Some(ref raft_node) = self.raft_node {\n            if raft_node.is_leader().await {\n                let entry = EntryData {\n                    metric_name: queue_name.to_string(),\n                    aggregation_type: \"avg\".to_string(),\n                    value: 0.0, // Will be calculated by the aggregation logic\n                    timestamp: std::time::SystemTime::now().duration_since(std::time::UNIX_EPOCH)?.as_secs(),\n                    sources: self.local_values.clone(),\n                };\n                if let Err(e) = raft_node.propose_aggregation(entry).await {\n                    eprintln!(\"Failed to propose aggregation to Raft cluster: {}\", e);\n                }\n            }\n        }\n        \n        let all_values = self.collect_all(queue_name).await?;\n        if all_values.is_empty() {\n            return Ok(0.0);\n        }\n\n        let sum: f64 = all_values.iter().sum();\n        Ok(sum / all_values.len() as f64)\n    }\n\n    /// Get the global maximum across all nodes\n    pub async fn global_max(\n        \u0026mut self,\n        queue_name: \u0026str,\n    ) -\u003e Result\u003cf64, Box\u003cdyn std::error::Error\u003e\u003e {\n        let all_values = self.collect_all(queue_name).await?;\n        if all_values.is_empty() {\n            return Ok(0.0);\n        }\n\n        Ok(all_values.into_iter().fold(f64::NEG_INFINITY, f64::max))\n    }\n\n    /// Get the global minimum across all nodes\n    pub async fn global_min(\n        \u0026mut self,\n        queue_name: \u0026str,\n    ) -\u003e Result\u003cf64, Box\u003cdyn std::error::Error\u003e\u003e {\n        let all_values = self.collect_all(queue_name).await?;\n        if all_values.is_empty() {\n            return Ok(0.0);\n        }\n\n        Ok(all_values.into_iter().fold(f64::INFINITY, f64::min))\n    }\n\n    /// Get the global sum across all nodes\n    pub async fn global_sum(\n        \u0026mut self,\n        queue_name: \u0026str,\n    ) -\u003e Result\u003cf64, Box\u003cdyn std::error::Error\u003e\u003e {\n        let all_values = self.collect_all(queue_name).await?;\n        Ok(all_values.iter().sum())\n    }\n\n    /// Get the global count of values matching a predicate\n    pub async fn global_count(\n        \u0026mut self,\n        queue_name: \u0026str,\n        predicate: \u0026str,\n    ) -\u003e Result\u003cusize, Box\u003cdyn std::error::Error\u003e\u003e {\n        let all_values = self.collect_all(queue_name).await?;\n        let predicate_fn = Self::parse_predicate(predicate)?;\n        Ok(all_values.iter().filter(|\u0026\u0026v| predicate_fn(v)).count())\n    }\n\n    /// Get the global standard deviation across all nodes\n    pub async fn global_stddev(\n        \u0026mut self,\n        queue_name: \u0026str,\n    ) -\u003e Result\u003cf64, Box\u003cdyn std::error::Error\u003e\u003e {\n        let all_values = self.collect_all(queue_name).await?;\n        if all_values.len() \u003c 2 {\n            return Ok(0.0);\n        }\n\n        let mean: f64 = all_values.iter().sum::\u003cf64\u003e() / all_values.len() as f64;\n        let variance: f64 = all_values\n            .iter()\n            .map(|\u0026x| (x - mean).powi(2))\n            .sum::\u003cf64\u003e()\n            / (all_values.len() - 1) as f64;\n        Ok(variance.sqrt())\n    }\n\n    /// Get the global percentile across all nodes\n    pub async fn global_percentile(\n        \u0026mut self,\n        queue_name: \u0026str,\n        percentile: f64,\n    ) -\u003e Result\u003cf64, Box\u003cdyn std::error::Error\u003e\u003e {\n        let mut all_values = self.collect_all(queue_name).await?;\n        if all_values.is_empty() {\n            return Ok(0.0);\n        }\n\n        all_values.sort_by(|a, b| a.partial_cmp(b).unwrap());\n\n        let index = (percentile / 100.0 * (all_values.len() - 1) as f64).round() as usize;\n        Ok(all_values[index.min(all_values.len() - 1)])\n    }\n\n    /// Get the global median across all nodes\n    pub async fn global_median(\n        \u0026mut self,\n        queue_name: \u0026str,\n    ) -\u003e Result\u003cf64, Box\u003cdyn std::error::Error\u003e\u003e {\n        self.global_percentile(queue_name, 50.0).await\n    }\n\n    /// Compute expression-based aggregation\n    ///\n    /// Example: node_health_score = \"(100 - cpu) + memory_free\"\n    /// Each node computes its local score, then we aggregate those scores.\n    pub async fn global_expression(\n        \u0026mut self,\n        expression: \u0026str,\n        sources: \u0026[String],\n        agg_type: \u0026AggregationType,\n    ) -\u003e Result\u003cf64, Box\u003cdyn std::error::Error\u003e\u003e {\n        // Collect values from all sources at each node\n        let node_scores = self.collect_all_expression(expression, sources).await?;\n\n        if node_scores.is_empty() {\n            return Ok(0.0);\n        }\n\n        // Aggregate the per-node scores using the specified aggregation\n        match agg_type {\n            AggregationType::Avg =\u003e {\n                let sum: f64 = node_scores.iter().sum();\n                Ok(sum / node_scores.len() as f64)\n            }\n            AggregationType::Max =\u003e Ok(node_scores\n                .into_iter()\n                .fold(f64::NEG_INFINITY, f64::max)),\n            AggregationType::Min =\u003e Ok(node_scores\n                .into_iter()\n                .fold(f64::INFINITY, f64::min)),\n            AggregationType::Sum =\u003e Ok(node_scores.iter().sum()),\n            AggregationType::Stddev =\u003e {\n                if node_scores.len() \u003c 2 {\n                    return Ok(0.0);\n                }\n                let mean: f64 = node_scores.iter().sum::\u003cf64\u003e() / node_scores.len() as f64;\n                let variance: f64 = node_scores\n                    .iter()\n                    .map(|\u0026x| (x - mean).powi(2))\n                    .sum::\u003cf64\u003e()\n                    / (node_scores.len() - 1) as f64;\n                Ok(variance.sqrt())\n            }\n            AggregationType::Percentile(pct) =\u003e {\n                let mut sorted = node_scores;\n                sorted.sort_by(|a, b| a.partial_cmp(b).unwrap());\n                let index = (*pct / 100.0 * (sorted.len() - 1) as f64).round() as usize;\n                Ok(sorted[index.min(sorted.len() - 1)])\n            }\n            AggregationType::Count(_) =\u003e Ok(node_scores.len() as f64),\n            AggregationType::Expression { .. } =\u003e Err(\"Nested expression aggregation not supported\".into()),\n        }\n    }\n\n    /// Parse a predicate string into a closure\n    fn parse_predicate(predicate: \u0026str) -\u003e Result\u003cBox\u003cdyn Fn(f64) -\u003e bool\u003e, String\u003e {\n        // Simple predicates like \"cpu \u003e 80\"\n        if let Some((var, rest)) = predicate.split_once(|c: char| !c.is_alphanumeric() \u0026\u0026 c != '_') {\n            let _var = var.trim();\n            let rest = rest.trim();\n\n            if rest.starts_with(\"\u003e=\") {\n                let threshold: f64 = rest[2..].trim().parse().map_err(|_| \"Invalid threshold\")?;\n                Ok(Box::new(move |v: f64| v \u003e= threshold))\n            } else if rest.starts_with(\"\u003e\") {\n                let threshold: f64 = rest[1..].trim().parse().map_err(|_| \"Invalid threshold\")?;\n                Ok(Box::new(move |v: f64| v \u003e threshold))\n            } else if rest.starts_with(\"\u003c=\") {\n                let threshold: f64 = rest[2..].trim().parse().map_err(|_| \"Invalid threshold\")?;\n                Ok(Box::new(move |v: f64| v \u003c= threshold))\n            } else if rest.starts_with(\"\u003c\") {\n                let threshold: f64 = rest[1..].trim().parse().map_err(|_| \"Invalid threshold\")?;\n                Ok(Box::new(move |v: f64| v \u003c threshold))\n            } else if rest.starts_with(\"==\") {\n                let threshold: f64 = rest[2..].trim().parse().map_err(|_| \"Invalid threshold\")?;\n                let threshold_copy = threshold;\n                Ok(Box::new(move |v: f64| (v - threshold_copy).abs() \u003c 0.001))\n            } else {\n                Err(\"Unknown predicate operator\".to_string())\n            }\n        } else {\n            Err(\"Invalid predicate format\".to_string())\n        }\n    }\n\n    /// Evaluate expression at a single node\n    fn evaluate_expression(\u0026self, expression: \u0026str, sources: \u0026[String]) -\u003e Result\u003cf64, String\u003e {\n        use evalexpr::DefaultNumericTypes;\n        let mut context: HashMapContext\u003cDefaultNumericTypes\u003e = HashMapContext::new();\n\n        for source in sources {\n            if let Some(\u0026value) = self.local_values.get(source) {\n                context\n                    .set_value(source.clone(), Value::Float(value))\n                    .map_err(|e| e.to_string())?;\n            }\n        }\n\n        evalexpr::eval_float_with_context(expression, \u0026context)\n            .map_err(|e| format!(\"Expression error: {}\", e))\n    }\n\n    /// Collect all values for expression evaluation from all nodes\n    async fn collect_all_expression(\n        \u0026mut self,\n        expression: \u0026str,\n        sources: \u0026[String],\n    ) -\u003e Result\u003cVec\u003cf64\u003e, Box\u003cdyn std::error::Error\u003e\u003e {\n        let mut node_scores = Vec::new();\n\n        // Compute local score\n        if let Ok(local_score) = self.evaluate_expression(expression, sources) {\n            node_scores.push(local_score);\n        }\n\n        // Collect scores from remote nodes\n        let remote_scores = self\n            .node_client\n            .collect_all_expression(expression, sources.to_vec())\n            .await?;\n        node_scores.extend(remote_scores);\n\n        Ok(node_scores)\n    }\n\n    /// Helper to collect all values from all nodes including local\n    async fn collect_all(\n        \u0026mut self,\n        queue_name: \u0026str,\n    ) -\u003e Result\u003cVec\u003cf64\u003e, Box\u003cdyn std::error::Error\u003e\u003e {\n        let mut values = Vec::new();\n\n        // Get local value if available\n        if let Some(\u0026local_value) = self.local_values.get(queue_name) {\n            values.push(local_value);\n        }\n\n        // Collect from remote nodes\n        let remote_values = self.node_client.collect_all_values(queue_name).await? ox\u003cdyn std::error::Error\u003e\u003e {\n        match \u0026self.method {\n            DiscoveryMethod::Static(nodes) =\u003e {\n                self.nodes = nodes.clone();\n                Ok(nodes.clone())\n            }\n            DiscoveryMethod::Mdns =\u003e {\n                // In a real implementation, this would use mDNS to discover nodes\n                // For now, we'll just return the current nodes\n                Ok(self.nodes.clone())\n            }\n        }\n    }\n    \n    /// Add a node to the discovery service\n    pub fn add_node(\u0026mut self, addr: SocketAddr) {\n        if !self.nodes.contains(\u0026addr) {\n            self.nodes.push(addr);\n        }\n    }\n    \n    /// Remove a node from the discovery service\n    pub fn remove_node(\u0026mut self, addr: \u0026SocketAddr) {\n        self.nodes.retain(|node| node != addr);\n    }\n    \n    /// Get the current list of nodes\n    pub fn nodes(\u0026self) -\u003e \u0026[SocketAddr] {\n        \u0026self.nodes\n    }\n}","traces":[{"line":25,"address":[7648235,7647984],"length":1,"stats":{"Line":0}},{"line":26,"address":[9562770],"length":1,"stats":{"Line":0}},{"line":27,"address":[9562825,9562880],"length":1,"stats":{"Line":0}},{"line":28,"address":[9618114,9618322],"length":1,"stats":{"Line":0}},{"line":35,"address":[9562070,9562167,9562247,9562542,9562032],"length":1,"stats":{"Line":0}},{"line":36,"address":[9617432],"length":1,"stats":{"Line":0}},{"line":37,"address":[9617530],"length":1,"stats":{"Line":0}},{"line":38,"address":[9617538,9617619,9617603],"length":1,"stats":{"Line":0}},{"line":39,"address":[9617696],"length":1,"stats":{"Line":0}},{"line":44,"address":[9617506,9617813],"length":1,"stats":{"Line":0}},{"line":50,"address":[9618368],"length":1,"stats":{"Line":0}},{"line":51,"address":[7648290],"length":1,"stats":{"Line":0}},{"line":52,"address":[9563110],"length":1,"stats":{"Line":0}},{"line":57,"address":[9562720],"length":1,"stats":{"Line":0}},{"line":58,"address 3e },\n\n    /// Response with expression evaluation result\n    ExpressionResponse {\n        sources: Vec\u003cString\u003e,\n        score: Option\u003cf64\u003e,\n    },\n\n    /// Request an aggregation operation\n    RequestAggregation {\n        queue_name: String,\n        operation: String,\n        args: Vec\u003cString\u003e,\n    },\n\n    /// Response with aggregation result\n    AggregationResponse { result: f64 },\n\n    /// Broadcast a value to all nodes\n    BroadcastValue { queue_name: String, value: f64 },\n}\n\n/// Node client for communicating with other nodes in the cluster\n#[derive(Clone)]\npub struct NodeClient {\n    _node_id: String,\n    nodes: Vec\u003cString\u003e,\n    timeout: Duration,\n}\n\nimpl NodeClient {\n    /// Create a new node client\n    pub fn new(node_id: String, nodes: Vec\u003cSocketAddr\u003e) -\u003e Self {\n        let node_addrs: Vec\u003cString\u003e = nodes.iter().map(|addr| format!(\"tcp://{}\", addr)).collect();\n\n        Self {\n            _node_id: node_id,\n            nodes: node_addrs,\n            timeout: Duration::from_secs(5),\n        }\n    }\n\n    /// Set the timeout duration\n    pub fn with_timeout(mut self, timeout: Duration) -\u003e Self {\n        self.timeout = timeout;\n        self\n    }\n\n    /// Request a value from a specific node and queue\n    pub async fn request_value(\n        \u0026self,\n        node: \u0026SocketAddr,\n        queue_name: \u0026str,\n    ) -\u003e Result\u003cOption\u003cf64\u003e, NodeClientError\u003e {\n        let addr = format!(\"tcp://{}\", node);\n        let message = NodeMessage::RequestValue {\n            queue_name: queue_name.to_string(),\n        };\n\n        let response = self.send_request(\u0026addr, message).await?;\n\n        match response {\n            NodeMessage::ValueResponse { value, .. } =\u003e Ok(value),\n            _ =\u003e Err(NodeClientError::Serialization(\n                \"Unexpected response type\".to_string(),\n            )),\n        }\n    }\n\n    /// Request an aggregation operation from a specific node\n    pub async fn request_aggregation(\n        \u0026self,\n        node: \u0026SocketAddr,\n        queue_name: \u0026str,\n        operation: \u0026str,\n        args: Vec\u003cString\u003e,\n    ) -\u003e Result\u003cf64, NodeClientError\u003e {\n        let addr = format!(\"tcp://{}\", node);\n        let message = NodeMessage::RequestAggregation {\n            queue_name: queue_name.to_string(),\n            operation: operation.to_string(),\n            args,\n        };\n\n        let response = self.send_request(\u0026addr, message).await?;\n\n        match response {\n            NodeMessage::AggregationResponse { result } =\u003e Ok(result),\n            _ =\u003e Err(NodeClientError::Serialization(\n                \"Unexpected response type\".to_string(),\n            )),\n        }\n    }\n\n    /// Broadcast a value to all nodes\n    pub async fn broadcast_value(\n        \u0026self,\n        queue_name: \u0026str,\n        value: f64,\n    ) -\u003e Result\u003c(), NodeClientError\u003e {\n        let message = NodeMessage::BroadcastValue {\n            queue_name: queue_name.to_string(),\n            value,\n        };\n\n        // Send to all nodes concurrently\n        let mut handles = Vec::new();\n        for addr in \u0026self.nodes {\n            let msg = message.clone();\n            let addr_clone = addr.clone();\n            handles.push(tokio::spawn(async move {\n                send_message(\u0026addr_clone, \u0026msg).await\n            }));\n        }\n\n        for handle in handles {\n            handle\n                .await\n                .map_err(|_| NodeClientError::Transport(\"Task cancelled\".to_string()))??;\n        }\n\n        Ok(())\n    }\n\n    /// Collect values from all nodes for a specific queue\n    pub async fn collect_all_values(\u0026self, queue_name: \u0026str) -\u003e Result\u003cVec\u003cf64\u003e, NodeClientError\u003 pping_add(self.clock_offset as u64)\n    }\n\n    /// Check if a timestamp is fresh (within max_age milliseconds)\n    pub fn is_fresh(\u0026self, timestamp: u64, max_age: u64) -\u003e bool {\n        let current_time = self.now();\n        timestamp + max_age \u003e= current_time\n    }\n\n    /// Get the clock offset\n    pub fn clock_offset(\u0026self) -\u003e i64 {\n        self.clock_offset\n    }\n}\n","traces":[{"line":16,"address":[8573248],"length":1,"stats":{"Line":0}},{"line":24,"address":[9559376],"length":1,"stats":{"Line":0}},{"line":31,"address":[9559388],"length":1,"stats":{"Line":0}},{"line":32,"address":[9559396],"length":1,"stats":{"Line":0}},{"line":37,"address":[9559552],"length":1,"stats":{"Line":0}},{"line":38,"address":[8573310],"length":1,"stats":{"Line":0}},{"line":39,"address":[9559584],"length":1,"stats":{"Line":0}},{"line":42,"address":[9559657],"length":1,"stats":{"Line":0}},{"line":43,"address":[9614987],"length":1,"stats":{"Line":0}},{"line":47,"address":[9615008],"length":1,"stats":{"Line":0}},{"line":48,"address":[9559725],"length":1,"stats":{"Line":0}},{"line":49,"address":[9559793,9559754],"length":1,"stats":{"Line":0}},{"line":53,"address":[9559488],"length":1,"stats":{"Line":0}},{"line":54,"address":[9559493],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":14},{"path":["/","home","neeraj","syncthing","Darkforce","Sync","Git_repos","autoqueues","src","expression","mod.rs"],"content":"//! Expression engine module using evalexpr\n//!\n//! Provides parsing and evaluation of mathematical expressions using the\n//! evalexpr crate for robust expression handling.\n\nuse evalexpr::{ContextWithMutableVariables, DefaultNumericTypes, HashMapContext, Value};\nuse std::collections::HashMap;\n\n/// Expression evaluation result\npub type EvalResult = Result\u003cf64, ExpressionError\u003e;\n\n/// Expression errors\n#[derive(Debug, thiserror::Error, PartialEq)]\npub enum ExpressionError {\n    #[error(\"Invalid expression: {0}\")]\n    InvalidExpression(String),\n    #[error(\"Variable not found: {0}\")]\n    UndefinedVariable(String),\n    #[error(\"Type error: {0}\")]\n    TypeError(String),\n    #[error(\"Evaluation error: {0}\")]\n    EvaluationError(String),\n}\n\n/// Evaluate an expression with the given variables\n///\n/// # Arguments\n/// * `expr` - The expression string to evaluate (e.g., \"a + b * 2\")\n/// * `variables` - A HashMap of variable names to f64 values\n///\n/// # Returns\n/// * `Ok(f64)` - The evaluated result\n/// * `Err(ExpressionError)` - If evaluation fails\npub fn evaluate_expression(expr: \u0026str, variables: \u0026HashMap\u003cString, f64\u003e) -\u003e EvalResult {\n    let mut context: HashMapContext\u003cDefaultNumericTypes\u003e = HashMapContext::new();\n\n    for (name, value) in variables {\n        let val = Value::from_float(*value);\n        context\n            .set_value(name.clone(), val)\n            .map_err(|e| ExpressionError::EvaluationError(e.to_string()))?;\n    }\n\n    evalexpr::eval_float_with_context(expr, \u0026context)\n        .map_err(|e| ExpressionError::EvaluationError(e.to_string()))\n}\n\n/// Check if an expression is valid (syntactically correct)\n///\n/// # Arguments\n/// * `expr` - The expression string to validate\n///\n/// # Returns\n/// * `true` - Expression is valid\n/// * `false` - Expression has syntax errors\npub fn is_valid_expression(expr: \u0026str) -\u003e bool {\n    evaluate_expression(expr, \u0026HashMap::new()).is_ok()\n}\n\n/// Parse and compile an expression for later evaluation\n///\n/// Returns a compiled expression that can be evaluated multiple times\n/// with different variable contexts.\npub fn compile_expression(expr: \u0026str) -\u003e Result\u003cCompiledExpression, ExpressionError\u003e {\n    // Validate expression syntax by trying to build it\n    // We use eval_float_with_context which parses and evaluates\n    // For expressions with undefined variables, we accept them as valid syntax\n    let context: HashMapContext\u003cDefaultNumericTypes\u003e = HashMapContext::new();\n\n    match evalexpr::eval_float_with_context(expr, \u0026context) {\n        Ok(_) =\u003e {\n            // Literal expressions work directly\n            Ok(CompiledExpression {\n                expression: expr.to_string(),\n            })\n        }\n        Err(ref e) =\u003e {\n            let err_str = e.to_string();\n            // Variables not defined is OK - syntax is valid\n            // The expression will work when variables are provided later\n            // Check for common variable-related error patterns\n            if err_str.contains(\"variable\")\n                || err_str.contains(\"not found\")\n                || err_str.contains(\"identifier\")\n            {\n                Ok(CompiledExpression {\n                    expression: expr.to_string(),\n                })\n            } else {\n                Err(ExpressionError::InvalidExpression(err_str))\n            }\n        }\n    }\n}\n\n/// A compiled expression ready for evaluation\n#[derive(Debug, Clone)]\npub struct CompiledExpression {\n    expression: String,\n}\n\nimpl CompiledExpression {\n    /// Evaluate the expression with the given variables\n    pub fn evaluate(\u0026self, variables: \u0026HashMap\u003cString, f64\u003e) -\u003e EvalResult {\n        evaluate_expression(\u0026self.expression, variables)\n    }\n\n    /// Get the original expression string\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.expression\n    }\n}\n\n// Backward compatibility types for existing code\npub use CompiledExpression as ExpressionAST;\npub use ExpressionError as ParseError;\n\n/// Migrate from Parser::parse to this function\npub use evaluate_expression as parse_and_evaluate;\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_evaluate_simple_expression() {\n        let mut vars = HashMap::new();\n        vars.insert(\"a\".to_string(), 10.0);\n        vars.insert(\"b\".to_string(), 20.0);\n\n        let result = evaluate_expression(\"a + b\", \u0026vars);\n        assert_eq!(result.unwrap(), 30.0);\n    }\n\n    #[test]\n    fn test_evaluate_with_operations() {\n        let mut vars = HashMap::new();\n        vars.insert(\"x\".to_string(), 5.0);\n\n        let result = evaluate_expression(\"x * 2 + 3\", \u0026vars);\n        assert_eq!(result.unwrap(), 13.0);\n    }\n\n    #[test]\n    fn test_invalid_expression() {\n        let vars = HashMap::new();\n        let result = evaluate_expression(\"invalid syntax ++\", \u0026vars);\n        assert!(result.is_err());\n    }\n\n    #[test]\n    fn test_is_valid_expression() {\n        // Test with variables defined\n        let mut vars = HashMap::new();\n        vars.insert(\"a\".to_string(), 1.0);\n        vars.insert(\"b\".to_string(), 2.0);\n\n        // These should work because variables are defined\n        assert!(evaluate_expression(\"a + b\", \u0026vars).is_ok());\n        assert!(evaluate_expression(\"a * b + 3\", \u0026vars).is_ok());\n\n        // Invalid syntax should fail\n        assert!(evaluate_expression(\"1 ++ 2\", \u0026HashMap::new()).is_err());\n    }\n\n    #[test]\n    fn test_compile_expression() {\n        // Compile should succeed for syntactically valid expressions\n        let compiled = compile_expression(\"a + b\");\n        assert!(\n            compiled.is_ok(),\n            \"compile_expression should succeed for valid syntax\"\n        );\n\n        // And it should evaluate with proper variables\n        let compiled = compiled.unwrap();\n        let mut vars = HashMap::new();\n        vars.insert(\"a\".to_string(), 5.0);\n        vars.insert(\"b\".to_string(), 3.0);\n        assert_eq!(compiled.evaluate(\u0026vars).unwrap(), 8.0);\n    }\n}\n","traces":[{"line":34,"address":[8801336,8801330,8800576],"length":1,"stats":{"Line":2}},{"line":35,"address":[8745320],"length":1,"stats":{"Line":2}},{"line":37,"address":[8745347,8745967,8745407],"length":1," 0μs target)\n//! - Networking: RDMA-ready transport abstractions\n//! - Coordination: Simple node management without consensus overhead\n\n// Core modules for HPC performance\npub mod autoqueues;\npub mod benchmarks;\npub mod cluster;\npub mod config;\npub mod constants;\npub mod dist;\npub mod expression;\npub mod metrics;\npub mod network;\npub mod node;\npub mod queue;\npub mod traits;\npub mod types;\n\n// Re-exports for programmatic API\npub use crate::autoqueues::AutoQueues;\npub use crate::config::{Config as AutoQueuesConfig, QueueConfig, ConfigError};\npub use crate::queue::source::AutoQueuesError;\npub use crate::cluster::raft_node::{ClusterConfig, RaftNode};\npub use crate::metrics::MetricsCollector;\npub use crate::network::transport_traits::{ConnectionInfo, Transport, TransportError, TransportType};\npub use crate::node::{AutoQueuesNode, start_node};\npub use crate::queue::QueueTrait;\npub use crate::queue::interval::IntervalConfig;\npub use crate::queue::persistence::{PersistenceConfig, QueuePersistence};\npub use crate::network::pubsub::zmq::{ZmqPubSubBroker, ZmqPubSubClient};\npub use crate::types::{QueueData, QueueStats, Timestamp};","traces":[],"covered":0,"coverable":0},{"path":["/","home","neeraj","syncthing","Darkforce","Sync","Git_repos","autoqueues","src","main.rs"],"content":"fn main() {\n    println!(\"Checking AutoQueues compilation...\");\n}\n","traces":[{"line":1,"address":[403344,403392],"length":1,"stats":{"Line":1}},{"line":2,"address":[403348],"length":1,"stats":{"Line":0}}],"covered":1,"coverable":2},{"path":["/","home","neeraj","syncthing","Darkforce","Sync","Git_repos","autoqueues","src","metrics.rs"],"content":"//! System Metrics Collection Module\n//!\n//! Provides real-time system information including CPU usage, memory consumption,\n//! disk usage, and system information. Uses sysinfo crate for cross-platform\n//! compatibility.\n//!\n//! Also provides MetricPublisher for sending atomic metrics to the cluster.\n\nuse crate::constants;\nuse serde::{Deserialize, Serialize};\nuse std::net::SocketAddr;\nuse std::time::{SystemTime, UNIX_EPOCH};\nuse sysinfo::{Disks, System};\nuse zmq::{Context, Socket, SocketType};\n\n/// System metrics data structure\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct SystemMetrics {\n    pub timestamp: u64,\n    pub cpu_usage_percent: f32,\n    pub memory_usage: MemoryMetrics,\n    pub disk_usage: DiskMetrics,\n    pub system_info: SystemInfo,\n}\n\n/// Memory usage metrics\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct MemoryMetrics {\n    pub total_gb: f32,\n    pub used_gb: f32,\n    pub free_gb: f32,\n    pub usage_percent: f32,\n    pub available_gb: f32,\n}\n\n/// Disk usage metrics for a specific disk\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct DiskMetrics {\n    pub total_gb: f32,\n    pub used_gb: f32,\n    pub free_gb: f32,\n    pub usage_percent: f32,\n    pub disk_name: String,\n    pub mount_point: String,\n}\n\n/// Basic system information\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct SystemInfo {\n    pub system_name: String,\n    pub kernel_version: String,\n    pub os_version: String,\n    pub uptime_seconds: u64,\n    pub process_count: usize,\n}\n\n/// System metrics collector\n#[derive(Debug)]\npub struct MetricsCollector {\n    system: System,\n}\n\nimpl MetricsCollector {\n    /// Create a new metrics collector\n    pub fn new() -\u003e Self {\n        let mut system = System::new_all();\n        system.refresh_all();\n        Self { system }\n    }\n\n    /// Refresh all system information\n    pub fn refresh(\u0026mut self) {\n        self.system.refresh_all();\n    }\n\n    /// Get current timestamp in milliseconds\n    fn get_timestamp() -\u003e u64 {\n        SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap_or_default()\n            .as_millis() as u64\n    }\n\n    /// Calculate CPU usage percentage across all cores\n    pub fn get_cpu_usage(\u0026mut self) -\u003e f32 {\n        self.system.refresh_cpu_all();\n        std::thread::sleep(std::time::Duration::from_millis(\n            constants::time::SHORT_SLEEP_INTERVAL_MS,\n        ));\n        self.system.refresh_cpu_all();\n\n        self.system.global_cpu_usage()\n    }\n\n    /// Get memory usage metrics\n    pub fn get_memory_usage(\u0026mut self) -\u003e MemoryMetrics {\n        self.system.refresh_memory();\n\n        let total_memory = self.system.total_memory();\n        let used_memory = self.system.used_memory();\n        let available_memory = self.system.available_memory();\n        let free_memory = self.system.free_memory();\n\n        let bytes_to_gb = |bytes: u64| -\u003e f32 { bytes as f32 / (1024.0 * 1024.0 * 1024.0) };\n\n        MemoryMetrics {\n            total_gb: bytes_to_gb(total_memory),\n            used_gb: bytes_to_gb(used_memory),\n            free_gb: bytes_to_gb(free_memory),\n            usage_percent: (used_memory as f32 / total_memory as f32) * 100.0,\n            available_gb: bytes_to_gb(available_memory),\n        }\n    }\n\n    /// Get disk usage metrics for the root filesystem\n    pub fn get_disk_usage(\u0026self) -\u003e Option\u003cDiskMetrics\u003e {\n        let disks = Disks::new_with_refreshed_list();\n\n        // Find root filesystem\n        if let Some(disk) = disks\n            .iter()\n            .find(|disk| disk.mount_point().to_str().unwrap_or(\"\") == \"/\")\n        {\n            let total = disk.total_space();\n            let available = disk.available_space();\n            let used = total.saturating_sub(available);\n\n            let bytes_to_gb = |bytes: u64| -\u003e f32 { bytes as f32 / (1024.0 * 1024.0 * 1024.0) };\n\n            Some(DiskMetrics {\n                total_gb: bytes_to_gb(total),\n                used_gb: bytes_to_gb(used),\n                free_gb: bytes_to_gb(available),\n                usage_percent: (used as f32 / total as f32) * 100.0,\n                disk_name: disk.name().to_string_lossy().to_string(),\n                mount_point: disk.mount_point().to_str().unwrap_or(\"unknown\").to_string(),\n            })\n        } else {\n            None // No root filesystem found\n        }\n    }\n\n    /// Get basic system information\n    pub fn get_system_info(\u0026mut self) -\u003e SystemInfo {\n        use sysinfo::ProcessesToUpdate;\n\n        self.system.refresh_all();\n        self.system.refresh_processes(ProcessesToUpdate::All, true);\n\n        SystemInfo {\n            system_name: System::name().unwrap_or_else(|| \"Unknown\".to_string()),\n            kernel_version: System::kernel_version().unwrap_or_else(|| \"Unknown\".to_string()),\n            os_version: System::os_version().unwrap_or_else(|| \"Unknown\".to_string()),\n            uptime_seconds: System::uptime(),\n            process_count: self.system.processes().len(),\n        }\n    }\n\n    /// Get comprehensive system metrics\n    pub fn get_all_metrics(\u0026mut self) -\u003e SystemMetrics {\n        let timestamp = Self::get_timestamp();\n        let cpu_usage = self.get_cpu_usage();\n        let memory = self.get_memory_usage();\n        let disk = self.get_disk_usage().unwrap_or_else(|| {\n            // Fallback disk metrics\n            DiskMetrics {\n                total_gb: 0.0,\n                used_gb: 0.0,\n                free_gb: 0.0,\n                usage_percent: 0.0,\n                disk_name: \"unknown\".to_string(),\n                mount_point: \"/\".to_string(),\n            }\n        });\n        let system_info = self.get_system_info();\n\n        SystemMetrics {\n            timestamp,\n            cpu_usage_percent: cpu_usage,\n            memory_usage: memory,\n            disk_usage: disk,\n            system_info,\n        }\n    }\n\n    /// Get quick system health score (0-100, higher is better)\n    pub fn get_health_score(\u0026mut self) -\u003e u8 {\n        let cpu_usage = self.get_cpu_usage();\n        let memory = self.get_memory_usage();\n        let disk = self.get_disk_usage();\n\n        let cpu_score = if cpu_usage \u003c 50.0 {\n            25\n        } else if cpu_usage \u003c 80.0 {\n            15\n        } else {\n            5\n        };\n        let memory_score = if memory.usage_percent \u003c 50.0 {\n            25\n        } else if memory.usage_percent \u003c 80.0 {\n            15\n        } else {\n            5\n        };\n        let disk_score = if let Some(disk_data) = disk {\n            if disk_data.usage_percent \u003c 70.0 {\n                25\n            } else if disk_data.usage_percent \u003c 90.0 {\n                15\n            } else {\n                5\n            }\n        } else {\n            20 // Default score if disk info unavailable\n        };\n\n        let base_score = 25; // System uptime and process health\n\n        (cpu_score + memory_score + disk_score + base_score) as u8\n    }\n}\n\nimpl Default for MetricsCollector {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n// === Metric Publisher for Distributed Operation ===\n\n/// Configuration for metric publishing\n#[derive(Debug, Clone)]\npub struct PublisherConfig {\n    pub node_id: u64,\n    pub publish_port: u16,\n    pub bind_addr: String,\n    pub peers: Vec\u003cSocketAddr\u003e,\n}\n\nimpl Default for PublisherConfig {\n    fn default() -\u003e Self {\n        Self {\n            node_id: 1,\n            publish_port: constants::network::DEFAULT_NODE_COMMUNICATION_PORT,\n            bind_addr: \"0.0.0.0\".to_string(),\n            peers: Vec::new(),\n        }\n    }\n}\n\nimpl PublisherConfig {\n    pub fn zmq_bind_addr(\u0026self) -\u003e String {\n        format!(\"tcp://{}:{}\", self.bind_addr, self.publish_port)\n    }\n}\n\n/// Metric Publisher - sends atomic metrics to the cluster via ZMQ PUB\npub struct MetricPublisher {\n    config: PublisherConfig,\n    socket: Socket,\n}\n\nimpl MetricPublisher {\n    pub fn new(config: PublisherConfig) -\u003e Result\u003cSelf, zmq::Error\u003e {\n        let ctx = Context::new();\n        let socket = ctx.socket(SocketType::PUB)?;\n        let _ = socket.set_linger(0);\n        socket.bind(\u0026config.zmq_bind_addr())?;\n\n        for peer in \u0026config.peers {\n            let peer_addr = format!(\"tcp://{}\", peer);\n            socket.connect(\u0026peer_addr)?;\n        }\n\n        Ok(Self { config, socket })\n    }\n\n    pub fn publish(\u0026self, metric: \u0026str, value: f64) {\n        let msg = format!(\"{}:{}:{}\", metric, self.config.node_id, value);\n        if let Err(e) = self.socket.send(\u0026msg, 0) {\n            eprintln!(\"Failed to publish metric {}: {}\", metric, e);\n        }\n    }\n\n    pub fn publish_cpu_percent(\u0026self, value: f64) {\n        self.publish(\"atomic.cpu_percent\", value);\n    }\n\n    pub fn publish_memory_percent(\u0026self, value: f64) {\n        self.publish(\"atomic.memory_percent\", value);\n    }\n\n    pub fn publish_port(\u0026self) -\u003e u16 {\n        self.config.publish_port\n    }\n\n    pub fn node_id(\u0026self) -\u003e u64 {\n        self.config.node_id\n    }\n}\n\n/// Parse incoming metric message: \"metric:node_id:value\"\npub fn parse_metric_message(msg: \u0026str) -\u003e Option\u003c(String, u64, f64)\u003e {\n    let parts: Vec\u003c\u0026str\u003e = msg.split(':').collect();\n    if parts.len() != 3 {\n        return None;\n    }\n    let metric = parts[0].to_string();\n    let node_id = parts[1].parse().ok()?;\n    let value = parts[2].parse().ok()?;\n    Some((metric, node_id, value))\n}\n\n#[cfg(test)]\nmod publisher_tests {\n    use super::*;\n\n    #[test]\n    fn test_parse_metric_message() {\n        let msg = \"atomic.cpu_percent:1:45.5\";\n        let parsed = parse_metric_message(msg).unwrap();\n        assert_eq!(parsed.0, \"atomic.cpu_percent\");\n        assert_eq!(parsed.1, 1);\n        assert_eq!(parsed.2, 45.5);\n    }\n\n    #[test]\n    fn test_parse_invalid_message() {\n        assert!(parse_metric_message(\"invalid\").is_none());\n        assert!(parse_metric_message(\"a:b\").is_none());\n    }\n\n    #[test]\n    fn test_publisher_config_default() {\n        let config = PublisherConfig::default();\n        assert_eq!(config.node_id, 1);\n        assert_eq!(config.publish_port, 6967);\n        assert_eq!(config.zmq_bind_addr(), \"tcp://0.0.0.0:6967\");\n    }\n}\n","traces":[{"line":65,"address":[9316688,9316835,9316841],"length":1,"stats":{"Line":0}},{"line":66,"address":[8580448],"length":1,"stats":{"Line":0}},{"line":67,"address":[9372040],"length":1,"stats":{"Line":0}},{"line":72,"address":[9316864],"length":1,"stats":{"Line":0}},{"line":73,"address":[9316869],"length":1,"stats":{"Line":0}},{"line":77,"address":[8577232],"length":1,"stats":{"Line":0}},{"line":78,"address":[9313460],"length":1,"stats":{"Line":0}},{"line":79,"address":[8577254],"length":1,"stats":{"Line":0}},{"line":80,"address":[9313511],"length":1,"stats":{"Line":0}},{"line":81,"address":[9313534],"length":1,"stats":{"Line":0}},{"line":85,"address":[9368688],"length":1,"stats":{"Line":0}},{"line":86,"address":[9313390],"length":1,"stats":{"Line":0}},{"line":87,"address":[9368708],"length":1,"stats":{"Line":0}},{"line":90,"address":[9368734],"length":1,"stats":{"Line":0}},{"line":92,"address":[8577209],"length":1,"stats":{"Line":0}},{"line":96,"address":[8579952],"length":1,"stats":{"Line":0}},{"line":97,"address":[9316243],"length":1,"stats":{"Line":0}},{"line":99,"address":[8580001],"length":1,"stats":{"Line":0}},{"line":100,"address":[9371596],"length":1,"stats":{"Line":0}},{"line":101,"address":[9371623],"length":1,"stats":{"Line":0}},{"line":102,"address":[9316341],"length":1,"stats":{"Line":0}},{"line":104,"address":[9008330,9008320,9008393],"length":1,"stats":{"Line":0}},{"line":107,"address":[8580122],"length":1,"stats":{"Line":0}},{"line":108,"address":[9316399],"length":1,"stats":{"Line":0}},{"line":109,"address":[9371732],"length":1,"stats":{"L Mutex\u003cSocket\u003e\u003e,\n    /// Connection info\n    connection_info: Option\u003cConnectionInfo\u003e,\n    /// Remote address\n    remote_addr: String,\n}\n\nimpl std::fmt::Debug for ZmqTransport {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.debug_struct(\"ZmqTransport\")\n            .field(\"connection_info\", \u0026self.connection_info)\n            .field(\"remote_addr\", \u0026self.remote_addr)\n            .finish()\n    }\n}\n\nimpl ZmqTransport {\n    /// Create a new ZMQ transport\n    pub fn new() -\u003e Result\u003cSelf, Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n        let context = Context::new();\n        let socket = context.socket(SocketType::REQ)?;\n\n        Ok(Self {\n            _context: context,\n            socket: Arc::new(Mutex::new(socket)),\n            connection_info: None,\n            remote_addr: String::new(),\n        })\n    }\n\n    /// Get the underlying socket\n    pub fn socket(\u0026self) -\u003e \u0026Arc\u003cMutex\u003cSocket\u003e\u003e {\n        \u0026self.socket\n    }\n}\n\n#[async_trait]\nimpl Transport for ZmqTransport {\n    /// Connect to remote address\n    async fn connect(\u0026self, addr: \u0026str) -\u003e Result\u003cConnectionInfo, TransportError\u003e {\n        let socket = self.socket.lock().await;\n        \n        // Connect to the address\n        socket.connect(addr).map_err(|_e| TransportError::ConnectionLost {\n            remote_addr: addr.parse().unwrap_or_else(|_| SocketAddr::from(([0, 0, 0, 0], 0))),\n        })?;\n\n        let connection_info = ConnectionInfo {\n            remote_addr: addr.to_string(),\n            transport_type: TransportType::ZeroMQ,\n            connected_at: Instant::now(),\n        };\n\n        drop(socket);\n\n        // Store connection info\n        // Note: In a truly concurrent-safe design, we'd use interior mutability\n        // For now, this is set after construction\n        Ok(connection_info)\n    }\n\n    /// Send data to remote endpoint\n    async fn send(\u0026self, data: \u0026[u8]) -\u003e Result\u003c(), TransportError\u003e {\n        let socket = self.socket.lock().await;\n        \n        let msg = Message::from(data);\n        socket.send(msg, 0).map_err(|_e| TransportError::ConnectionLost {\n            remote_addr: self.remote_addr.parse().unwrap_or_else(|_| SocketAddr::from(([0, 0, 0, 0], 0))),\n        })?;\n\n        Ok(())\n    }\n\n    /// Receive data from remote endpoint\n    async fn receive(\u0026self) -\u003e Result\u003cVec\u003cu8\u003e, TransportError\u003e {\n        let socket = self.socket.lock().await;\n        \n        let msg = socket.recv_bytes(0).map_err(|_e| TransportError::ConnectionLost {\n            remote_addr: self.remote_addr.parse().unwrap_or_else(|_| SocketAddr::from(([0, 0, 0, 0], 0))),\n        })?;\n\n        Ok(msg)\n    }\n\n    /// Check if connected\n    fn is_connected(\u0026self) -\u003e bool {\n        self.connection_info.is_some()\n    }\n\n    /// Get connection info\n    fn connection_info(\u0026self) -\u003e Option\u003cConnectionInfo\u003e {\n        self.connection_info.clone()\n    }\n}\n\n/// Message types for node-to-node communication\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub enum NodeMessage {\n    /// Request a value from a specific queue\n    RequestValue { queue_name: String },\n\n    /// Response with a value from a queue\n    ValueResponse {\n        queue_name: String,\n        value: Option\u003cf64\u003e,\n    },\n\n    /// Request an expression evaluation\n    RequestExpression { sources: Vec\u003cString\u003e },\n\n    /// Response with expression evaluation result\n    ExpressionResponse {\n        sources: Vec\u003cString\u003e,\n        score: Option\u003cf64\u003e,\n    },\n\n    /// Request an aggregation operation\n    RequestAggregation {\n        queue_name: String,\n        operation: String,\n        args: Vec\u003cString\u003e,\n    },\n\n    /// Response with aggregation result\n    AggregationResponse { result: f64 },\n\n    /// Broadcast a value to all nodes\n    BroadcastValue { queue_name: String, value: f64 },\n}\n\n/// Send a message using ZMQ transport\npub async fn send_message(\n    transport: \u0026ZmqTransport,\n    addr: \u0026str,\n    message: \u0026NodeMessage,\n) -\u003e Result\u003c(), Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n    use crate::traits::transport::Transport;\n\n    let data = serde_json::to_vec(message)?;\n\n    // Connect if not already connected\n    if !transport.is_connected() {\n        transport.connect(addr).await?;\n    }\n\n    Transport::send(transport, \u0026data).await?;\n\n    Ok(())\n}\n\n/// Request a value from a node\npub async fn request_value(\n    addr: \u0026SocketAddr,\n    queue_name: \u0026str,\n) -\u003e Result\u003cOption\u003cf64\u003e, Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n    let transport = ZmqTransport::new()?;\n    let addr_str = format!(\"tcp://{}\", addr);\n\n    let message = NodeMessage::RequestValue {\n        queue_name: queue_name.to_string(),\n    };\n\n    send_message(\u0026transport, \u0026addr_str, \u0026message).await?;\n\n    let response_data = transport.receive().await?;\n    let response_msg: NodeMessage = serde_json::from_slice(\u0026response_data)?;\n\n    match response_msg {\n        NodeMessage::ValueResponse { value, .. } =\u003e Ok(value),\n        _ =\u003e Err(\"Unexpected response type\".into()),\n    }\n}\n\n/// Request an expression score from a node\npub async fn request_expression_score(\n    addr: \u0026SocketAddr,\n    sources: \u0026[String],\n) -\u003e Result\u003cOption\u003cf64\u003e, Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n    let transport = ZmqTransport::new()?;\n    let addr_str = format!(\"tcp://{}\", addr);\n\n    let message = NodeMessage::RequestExpression {\n        sources: sources.to_vec(),\n    };\n\n    send_message(\u0026transport, \u0026addr_str, \u0026message).await?;\n\n    let response_data = transport.receive().await?;\n    let response_msg: NodeMessage = serde_json::from_slice(\u0026response_data)?;\n\n    match response_msg {\n        NodeMessage::ExpressionResponse { score, .. } =\u003e Ok(score),\n        _ =\u003e Err(\"Unexpected response type\".into()),\n    }\n}\n\n/// Request an aggregation operation from a node\npub async fn request_aggregation(\n    addr: \u0026SocketAddr,\n    queue_name: \u0026str,\n    operation: \u0026str,\n    args: Vec\u003cString\u003e,\n) -\u003e Result\u003cf64, Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n    let transport = ZmqTransport::new()?;\n    let addr_str = format!(\"tcp://{}\", addr);\n\n    let message = NodeMessage::RequestAggregation {\n        queue_name: queue_name.to_string(),\n        operation: operation.to_string(),\n        args,\n    };\n\n    send_message(\u0026transport, \u0026addr_str, \u0026message).await?;\n\n    let response_data = transport.receive().await?;\n    let response_msg: NodeMessage = serde_json::from_slice(\u0026response_data)?;\n\n    match response_msg {\n        NodeMessage::AggregationResponse { result } =\u003e Ok(result),\n        _ =\u003e Err(\"Unexpected response type\".into()),\n    }\n}","traces":[{"line":29,"address":[9170896],"length":1,"stats":{"Line":0}},{"line":30,"address":[9115602],"length":1,"stats":{"Line":0}},{"line":31,"address":[9115629],"length":1,"stats":{"Line":0}},{"line":32,"address":[9115670],"length":1,"stats":{"Line":0}},{"line":39,"address":[9112224,9112892,9112982],"length":1,"stats":{"Line":0}},{"line":40,"address":[9167553],"length":1,"stats":{"Line":0}},{"line":41,"address":[9228183,9228260],"length":1,"stats":{"Line":0}},{"line":43,"address":[9112730],"length":1,"stats":{"Line":0}},{"line":44,"address":[9112485],"length":1,"stats":{"Line":0}},{"line":45,"address":[9167930,9167818],"length":1,"stats":{"Line":0}},{"line":46,"address":[9112663],"le // Create a temporary socket for this request\n        let request_socket = self.context.socket(SocketType::REQ)?;\n        request_socket.connect(\u0026addr)?;\n        \n        // In a real implementation, we would send the data and receive a response\n        // For now, we'll just return empty data\n        Ok(vec![])\n    }\n    \n    /// Send install snapshot request (simplified implementation)\n    pub async fn send_install_snapshot(\n        \u0026self,\n        target: u64,\n        _data: \u0026[u8],\n    ) -\u003e Result\u003cVec\u003cu8\u003e, Box\u003cdyn std::error::Error + Send + Sync\u003e\u003e {\n        let addr = self.get_address(target);\n        \n        // Create a temporary socket for this request\n        let request_socket = self.context.socket(SocketType::REQ)?;\n        request_socket.connect(\u0026addr)?;\n        \n        // In a real implementation, we would send the data and receive a response\n        // For now, we'll just return empty data\n        Ok(vec![])\n    }\n}","traces":[{"line":21,"address":[9559072,9559295],"length":1,"stats":{"Line":0}},{"line":22,"address":[9559169,9559107],"length":1,"stats":{"Line":0}},{"line":24,"address":[9559228],"length":1,"stats":{"Line":0}},{"line":27,"address":[9559203],"length":1,"stats":{"Line":0}},{"line":31,"address":[9613936],"length":1,"stats":{"Line":0}},{"line":32,"address":[9613977],"length":1,"stats":{"Line":0}},{"line":33,"address":[9450068],"length":1,"stats":{"Line":0}},{"line":35,"address":[9558933],"length":1,"stats":{"Line":0}},{"line":40,"address":[9558976],"length":1,"stats":{"Line":0}},{"line":45,"address":[7719937],"length":1,"stats":{"Line":0}},{"line":48,"address":[7720619,7720070,7720015],"length":1,"stats":{"Line":0}},{"line":49,"address":[7720249,7720317],"length":1,"stats":{"Line":0}},{"line":53,"address":[7720436],"length":1,"stats":{"Line":0}},{"line":57,"address":[9559328],"length":1,"stats":{"Line":0}},{"line":62,"address":[7721633],"length":1,"stats":{"Line":0
