[package]
name = "autoqueues"
version = "0.1.0"
edition = "2024"

# Disable doctests due to system rustdoc issue
[lib]
doctest = false

[dependencies]
circular-buffer = "1.2"
tokio = { version = "1", features = ["full"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sysinfo = "0.37"
bincode = { version = "2.0" }
uuid = { version = "1", features = ["v4"] }
regex = "1.12"
toml = "0.9"
quinn = "0.11"
rustls = "0.23"
rcgen = "0.14"
# Additional dependencies for stratified networking
futures = "0.3"
socket2 = "0.6"
ordered-float = "5"
cron = "0.15"
chrono = { version = "0.4", features = ["serde"] }
zmq = "0.10.0"
eval = "0.4.3"
async-trait = "0.1.89"

[dev-dependencies]
criterion = "0.8"
