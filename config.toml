# =============================================================================
# AutoQueues Configuration
# =============================================================================
#
# For local testing with 3 nodes on localhost:
#   NODE_ID=1 cargo run --example local_node -- --config config.toml
#   NODE_ID=2 cargo run --example local_node -- --config config.toml
#   NODE_ID=3 cargo run --example local_node -- --config config.toml
#
# =============================================================================

# =============================================================================
# SECTION 1: CLUSTER NODES
# =============================================================================
# Each node has dedicated ports for different purposes

[node1]
host = "127.0.0.1"
communication_port = 7067
query_port = 7069
coordination_port = 7070
pubsub_port = 7071

[node2]
host = "127.0.0.1"
communication_port = 7167
query_port = 7169
coordination_port = 7170
pubsub_port = 7171

[node3]
host = "127.0.0.1"
communication_port = 7267
query_port = 7269
coordination_port = 7270
pubsub_port = 7271

# =============================================================================
# SECTION 2: LOCAL METRIC SOURCES
# =============================================================================
# Metrics collected by THIS node.
#
# Format: queue_name = source_type:source_name
#
# Source Types:
#   - function:xxx  -> calls system/custom function
#   - expression:x  -> evaluates expression using local metric names
#
# Available System Functions:
#   - function:cpu         -> CPU usage percentage (0-100)
#   - function:memory      -> Memory usage percentage (0-100)
#   - function:memory_free -> Free memory in GB
#   - function:disk        -> Disk usage percentage (0-100)
#   - function:sensor_xxx  -> Custom sensor functions

[local]
# System metrics
cpu = "function:cpu"
memory = "function:memory"
memory_free = "function:memory_free"

# Sensor metrics
temperature = "function:sensor_temp"
vibration = "function:vibration"

# Computed metrics
load_avg = "expression:(cpu + memory) / 2"

# =============================================================================
# SECTION 3: GLOBAL METRICS (AGGREGATED ACROSS ALL NODES)
# =============================================================================
# Each global metric is computed by aggregating values from all nodes.
#
# Aggregation Types:
#   - avg              -> arithmetic mean
#   - max              -> maximum value
#   - min              -> minimum value
#   - sum              -> sum of all values
#   - p50, p95, p99    -> percentiles
#   - stddev           -> standard deviation
#   - count:pred       -> count matching predicate
#
# For expression aggregations:
#   - expression = "(formula using source names)"
#   - sources = ["list", "of", "source", "names"]
#   - aggregation = "how to aggregate the computed scores"

[global]

# Basic aggregations
[global.cpu_avg]
aggregation = "avg"
sources = ["cpu"]
interval_ms = 1000

[global.temperature_max]
aggregation = "max"
sources = ["temperature"]
interval_ms = 2000

[global.vibration_p95]
aggregation = "p95"
sources = ["vibration"]
interval_ms = 500

# Expression-based aggregations
[global.node_health_score]
expression = "(100 - cpu) + memory_free"
sources = ["cpu", "memory_free"]
aggregation = "avg"
interval_ms = 1000

# =============================================================================
# SECTION 4: QUEUE SETTINGS
# =============================================================================

[queue]
capacity = 1024
default_interval = 1000

# =============================================================================
# SECTION 5: DEBUG SETTINGS
# =============================================================================

[debug]
verbose = true
simulate_sensors = true